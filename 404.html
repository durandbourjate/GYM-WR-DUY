<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Weiterleitung...</title>
  <script>
    (function() {
      var l = window.location;
      // Unterstützte App-Bases (Production + Staging). Reihenfolge: spezifischste zuerst.
      var bases = ['/GYM-WR-DUY/staging/', '/GYM-WR-DUY/ExamLab/'];
      var defaultBase = bases[1];

      function redirectUnterBase(base, route) {
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          base + '?p=/' + encodeURIComponent(route) +
          (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
          l.hash
        );
      }

      // 1. Pfad liegt bereits unter einer bekannten Base → SPA-Redirect mit Query-Parameter
      for (var i = 0; i < bases.length; i++) {
        var base = bases[i];
        if (l.pathname.startsWith(base) && l.pathname !== base) {
          redirectUnterBase(base, l.pathname.slice(base.length));
          return;
        }
      }

      // 2. Bekannte ExamLab-Routes OHNE Base-Path (z.B. direkter Aufruf /login)
      //    → auf Default-Base umleiten
      var examLabRoutes = [
        '/login', '/favoriten', '/home', '/sus', '/pruefung', '/uebung',
        '/fragensammlung', '/einstellungen'
      ];
      var pfad = l.pathname;
      for (var j = 0; j < examLabRoutes.length; j++) {
        if (pfad === examLabRoutes[j] || pfad.startsWith(examLabRoutes[j] + '/')) {
          redirectUnterBase(defaultBase, pfad.slice(1));
          return;
        }
      }
    })();
  </script>
</head>
<body>
  <h1>Seite nicht gefunden</h1>
  <p><a href="/GYM-WR-DUY/">Zur Startseite</a></p>
</body>
</html>
