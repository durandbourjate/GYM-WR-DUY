name: Deploy to GitHub Pages

on:
  push:
    branches: [main, preview]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Production immer von main bauen (auch wenn preview-Push den Workflow triggert)
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            Unterrichtsplaner/package-lock.json
            Pruefung/package-lock.json

      - name: Install Unterrichtsplaner dependencies
        working-directory: Unterrichtsplaner
        run: npm ci

      - name: Build Unterrichtsplaner
        working-directory: Unterrichtsplaner
        run: npx tsc -b && npx vite build

      - name: Install Pruefung dependencies
        working-directory: Pruefung
        run: npm ci

      - name: Build Pruefung
        working-directory: Pruefung
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_APPS_SCRIPT_URL: ${{ secrets.VITE_APPS_SCRIPT_URL }}
        run: npx tsc -b && npx vite build

      # Combine: repo root (Uebungen etc.) + Unterrichtsplaner + Pruefung builds
      - name: Prepare combined site
        run: |
          mkdir -p _site/Unterrichtsplaner _site/Pruefung
          # Copy static content (Uebungen + root landing page)
          cp -r Uebungen _site/Uebungen
          cp index.html _site/ 2>/dev/null || true
          # Copy Unterrichtsplaner build output
          cp -r Unterrichtsplaner/dist/* _site/Unterrichtsplaner/
          # Copy Pruefung build output
          cp -r Pruefung/dist/* _site/Pruefung/
          # Clean up macOS artifacts
          find _site -name '.DS_Store' -delete

      # === Staging: Pruefung vom preview-Branch bauen (falls vorhanden) ===
      - name: Checkout preview branch
        uses: actions/checkout@v4
        with:
          ref: preview
          path: preview-src
        continue-on-error: true
        id: checkout-preview

      - name: Install Staging dependencies
        if: steps.checkout-preview.outcome == 'success'
        working-directory: preview-src/Pruefung
        run: npm ci

      - name: Build Staging (Pruefung from preview)
        if: steps.checkout-preview.outcome == 'success'
        working-directory: preview-src/Pruefung
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_APPS_SCRIPT_URL: ${{ secrets.VITE_APPS_SCRIPT_URL }}
          VITE_BASE_PATH: /GYM-WR-DUY/staging/
        run: npx tsc -b && npx vite build

      - name: Add staging to site
        if: steps.checkout-preview.outcome == 'success'
        run: |
          mkdir -p _site/staging
          cp -r preview-src/Pruefung/dist/* _site/staging/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
