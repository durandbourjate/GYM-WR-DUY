<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Kündigungsfristen (OR 335c) — Ordne zu</text>

  <!-- Column 1: Probezeit -->
  <rect x="20" y="55" width="240" height="330" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="140" y="79" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#15803d">Probezeit</text>
  <text x="140" y="96" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="10" fill="#64748b">Max. 3 Monate (OR 335b)</text>
  <line x1="35" y1="104" x2="245" y2="104" stroke="#86efac" stroke-width="1"/>
  <rect x="35" y="114" width="210" height="38" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="35" y="160" width="210" height="38" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Column 2: 1. Dienstjahr -->
  <rect x="280" y="55" width="240" height="330" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="400" y="79" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#15803d">1. Dienstjahr</text>
  <text x="400" y="96" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="10" fill="#64748b">OR 335c Abs. 1</text>
  <line x1="295" y1="104" x2="505" y2="104" stroke="#86efac" stroke-width="1"/>
  <rect x="295" y="114" width="210" height="38" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="295" y="160" width="210" height="38" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Column 3: Ab 2. Dienstjahr -->
  <rect x="540" y="55" width="240" height="330" rx="8" fill="#bbf7d0" stroke="#22c55e" stroke-width="2"/>
  <text x="660" y="79" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#15803d">Ab 2. Dienstjahr</text>
  <text x="660" y="96" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="10" fill="#64748b">OR 335c Abs. 1</text>
  <line x1="555" y1="104" x2="765" y2="104" stroke="#86efac" stroke-width="1"/>
  <rect x="555" y="114" width="210" height="38" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="555" y="160" width="210" height="38" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Timeline bar at bottom -->
  <line x1="50" y1="340" x2="750" y2="340" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="746,334 746,346 758,340" fill="#94a3b8"/>
  <text x="50" y="358" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="10" fill="#64748b">Tag 1</text>
  <text x="290" y="358" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="10" fill="#64748b">nach 3 Mt.</text>
  <text x="520" y="358" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="10" fill="#64748b">nach 1 Jahr</text>
  <text x="750" y="358" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="10" fill="#64748b">→ Zeit</text>
  <line x1="290" y1="334" x2="290" y2="346" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="520" y1="334" x2="520" y2="346" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Hint -->
  <text x="400" y="392" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#94a3b8">Ziehe die Regelungen in die passende Zeitspanne</text>
</svg>
