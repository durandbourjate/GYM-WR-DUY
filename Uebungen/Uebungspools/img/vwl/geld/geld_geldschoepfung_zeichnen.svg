<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#ffffff" rx="8"/>
  <text x="400" y="32" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Geldschoepfungsmultiplikator (Mindestreserve 10%)</text>
  <!-- Defs for arrowheads -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f97316"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <!-- Bank A -->
  <rect x="40" y="70" width="160" height="100" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="120" y="95" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#1e293b">Bank A</text>
  <text x="120" y="118" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#64748b">Einlage: 1'000 CHF</text>
  <text x="120" y="138" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#ef4444">Reserve: 100 CHF</text>
  <text x="120" y="155" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#22c55e">Kredit: 900 CHF</text>
  <!-- Arrow A to B -->
  <line x1="200" y1="120" x2="240" y2="120" stroke="#f97316" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="220" y="110" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="9" fill="#f97316">900</text>
  <!-- Bank B -->
  <rect x="250" y="70" width="160" height="100" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="330" y="95" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#1e293b">Bank B</text>
  <text x="330" y="118" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#64748b">Einlage: 900 CHF</text>
  <text x="330" y="138" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#ef4444">Reserve: 90 CHF</text>
  <text x="330" y="155" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#22c55e">Kredit: 810 CHF</text>
  <!-- Arrow B to C -->
  <line x1="410" y1="120" x2="450" y2="120" stroke="#f97316" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="110" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="9" fill="#f97316">810</text>
  <!-- Bank C -->
  <rect x="460" y="70" width="160" height="100" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="540" y="95" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#1e293b">Bank C</text>
  <text x="540" y="118" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#64748b">Einlage: 810 CHF</text>
  <text x="540" y="138" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#ef4444">Reserve: 81 CHF</text>
  <text x="540" y="155" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#22c55e">Kredit: 729 CHF</text>
  <!-- Arrow C to D -->
  <line x1="620" y1="120" x2="660" y2="120" stroke="#f97316" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="640" y="110" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="9" fill="#f97316">729</text>
  <!-- Bank D (faded) -->
  <rect x="670" y="70" width="100" height="100" rx="8" fill="#fff7ed" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="720" y="110" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">Bank D</text>
  <text x="720" y="130" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="10" fill="#94a3b8">729 CHF</text>
  <text x="720" y="155" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="10" fill="#94a3b8">...</text>
  <!-- Summary table -->
  <rect x="100" y="210" width="600" height="180" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
  <!-- Header -->
  <rect x="100" y="210" width="600" height="30" rx="8" fill="#1e293b"/>
  <rect x="100" y="225" width="600" height="15" fill="#1e293b"/>
  <text x="200" y="230" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" font-weight="700" fill="#ffffff">Runde</text>
  <text x="340" y="230" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" font-weight="700" fill="#ffffff">Einlage</text>
  <text x="470" y="230" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" font-weight="700" fill="#ffffff">Reserve (10%)</text>
  <text x="600" y="230" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" font-weight="700" fill="#ffffff">Kredit</text>
  <!-- Row 1 -->
  <text x="200" y="260" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#1e293b">1. Bank A</text>
  <text x="340" y="260" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#1e293b">1'000 CHF</text>
  <text x="470" y="260" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#ef4444">100 CHF</text>
  <text x="600" y="260" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#22c55e">900 CHF</text>
  <!-- Row 2 -->
  <text x="200" y="285" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#1e293b">2. Bank B</text>
  <text x="340" y="285" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#1e293b">900 CHF</text>
  <text x="470" y="285" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#ef4444">90 CHF</text>
  <text x="600" y="285" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#22c55e">810 CHF</text>
  <!-- Row 3 -->
  <text x="200" y="310" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#1e293b">3. Bank C</text>
  <text x="340" y="310" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#1e293b">810 CHF</text>
  <text x="470" y="310" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#ef4444">81 CHF</text>
  <text x="600" y="310" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#22c55e">729 CHF</text>
  <!-- Row 4 -->
  <text x="200" y="335" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">...</text>
  <text x="340" y="335" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">...</text>
  <text x="470" y="335" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">...</text>
  <text x="600" y="335" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">...</text>
  <!-- Total -->
  <line x1="110" y1="350" x2="690" y2="350" stroke="#94a3b8" stroke-width="1"/>
  <text x="200" y="375" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#1e293b">Total</text>
  <text x="340" y="375" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#f97316">10'000 CHF</text>
  <text x="470" y="375" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#ef4444">1'000 CHF</text>
  <text x="600" y="375" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#22c55e">9'000 CHF</text>
  <!-- Formula -->
  <text x="400" y="425" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="600" fill="#1e293b">Multiplikator m = 1 / Mindestreservesatz = 1 / 0.10 = 10</text>
  <text x="400" y="443" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#64748b">Gesamte Geldmenge = Einlage x m = 1'000 x 10 = 10'000 CHF</text>
</svg>