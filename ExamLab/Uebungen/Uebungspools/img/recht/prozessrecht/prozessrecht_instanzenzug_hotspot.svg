<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui,-apple-system,sans-serif">
  <rect width="800" height="600" fill="#fff"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#999"/>
    </marker>
  </defs>
  <!-- Box E (top) -->
  <rect x="250" y="40" width="300" height="70" rx="8" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="2"/>
  <text x="530" y="80" text-anchor="middle" fill="#666" font-size="16" font-weight="bold">E</text>
  <!-- Arrow up -->
  <line x1="400" y1="150" x2="400" y2="115" stroke="#999" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Box D -->
  <rect x="250" y="150" width="300" height="70" rx="8" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="2"/>
  <text x="530" y="190" text-anchor="middle" fill="#666" font-size="16" font-weight="bold">D</text>
  <!-- Arrow up -->
  <line x1="400" y1="260" x2="400" y2="225" stroke="#999" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Box C -->
  <rect x="250" y="260" width="300" height="70" rx="8" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="2"/>
  <text x="530" y="300" text-anchor="middle" fill="#666" font-size="16" font-weight="bold">C</text>
  <!-- Arrow up -->
  <line x1="400" y1="370" x2="400" y2="335" stroke="#999" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Box B -->
  <rect x="250" y="370" width="300" height="70" rx="8" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="2"/>
  <text x="530" y="410" text-anchor="middle" fill="#666" font-size="16" font-weight="bold">B</text>
  <!-- Arrow up -->
  <line x1="400" y1="480" x2="400" y2="445" stroke="#999" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Box A (bottom) -->
  <rect x="250" y="480" width="300" height="70" rx="8" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="2"/>
  <text x="530" y="520" text-anchor="middle" fill="#666" font-size="16" font-weight="bold">A</text>
</svg>