<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#ffffff" rx="8"/>
  <text x="400" y="32" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Vertragsabschluss nach OR 1</text>
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#22c55e"/>
    </marker>
    <marker id="arrowGreenRev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#22c55e"/>
    </marker>
  </defs>
  <!-- Party A -->
  <rect x="60" y="80" width="200" height="160" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="160" y="115" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Partei A</text>
  <text x="160" y="138" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#64748b">(Antragstellerin)</text>
  <line x1="80" y1="150" x2="240" y2="150" stroke="#dcfce7" stroke-width="1"/>
  <text x="160" y="175" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#1e293b">Willenserklaerung</text>
  <text x="160" y="195" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#64748b">= aeussere Kundgabe</text>
  <text x="160" y="211" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#64748b">des inneren Willens</text>
  <!-- Party B -->
  <rect x="540" y="80" width="200" height="160" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="640" y="115" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Partei B</text>
  <text x="640" y="138" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#64748b">(Antragsempfaengerin)</text>
  <line x1="560" y1="150" x2="720" y2="150" stroke="#dcfce7" stroke-width="1"/>
  <text x="640" y="175" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#1e293b">Willenserklaerung</text>
  <text x="640" y="195" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#64748b">= Zustimmung zum</text>
  <text x="640" y="211" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#64748b">Antrag</text>
  <!-- Arrow: Antrag (A to B) -->
  <line x1="260" y1="130" x2="530" y2="130" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="330" y="110" width="140" height="28" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="400" y="129" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#15803d">Antrag (Offerte)</text>
  <!-- Arrow: Annahme (B to A) -->
  <line x1="540" y1="195" x2="270" y2="195" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreenRev)"/>
  <rect x="330" y="180" width="140" height="28" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="400" y="199" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#15803d">Annahme (Akzept)</text>
  <!-- Konsens arrow down -->
  <line x1="400" y1="220" x2="400" y2="280" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="400" y="265" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" font-weight="600" fill="#22c55e">Konsens</text>
  <!-- Vertrag box -->
  <rect x="280" y="290" width="240" height="70" rx="12" fill="#22c55e" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="325" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="18" font-weight="700" fill="#ffffff">VERTRAG</text>
  <text x="400" y="348" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#dcfce7">uebereinstimmende Willenserklaerung</text>
  <!-- Requirements -->
  <rect x="80" y="380" width="640" height="55" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
  <text x="400" y="400" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" font-weight="600" fill="#1e293b">Voraussetzungen: Handlungsfaehigkeit (ZGB 12 ff.) + Keine Formvorschrift verletzt</text>
  <text x="400" y="420" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#64748b">Vertragsfreiheit (OR 19/20): Abschluss-, Inhalts-, Form-, Partner- und Aufhebungsfreiheit</text>
  <!-- OR reference -->
  <text x="400" y="442" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="10" fill="#94a3b8">Rechtsgrundlage: OR 1-10 (Entstehung durch Vertrag)</text>
</svg>