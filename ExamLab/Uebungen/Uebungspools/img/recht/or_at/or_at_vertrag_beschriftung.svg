<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui,-apple-system,sans-serif">
  <rect width="800" height="500" fill="#fff"/>
  <!-- Party A box -->
  <rect x="80" y="160" width="200" height="120" rx="8" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="2"/>
  <!-- Party B box -->
  <rect x="520" y="160" width="200" height="120" rx="8" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="2"/>
  <!-- Offer arrow (A -> B) -->
  <line x1="280" y1="200" x2="520" y2="200" stroke="#999" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Acceptance arrow (B -> A) -->
  <line x1="520" y1="260" x2="280" y2="260" stroke="#999" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#999"/>
    </marker>
  </defs>
  <!-- Contract zone -->
  <rect x="300" y="350" width="200" height="80" rx="8" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="2"/>
  <line x1="400" y1="280" x2="400" y2="350" stroke="#999" stroke-width="2" stroke-dasharray="6 3"/>
  <!-- Numbered markers -->
  <circle cx="180" cy="155" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="180" y="160" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">1</text>
  <circle cx="620" cy="155" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="620" y="160" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">2</text>
  <circle cx="400" cy="190" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="400" y="195" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">3</text>
  <circle cx="400" cy="250" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="400" y="255" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">4</text>
  <circle cx="400" cy="345" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="400" y="350" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">5</text>
</svg>