<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="520" fill="#fafafa"/>
  <text x="400" y="35" text-anchor="middle" font-size="16" fill="#666" font-weight="600">Normenhierarchie</text>
  <!-- Level 1 (top) -->
  <polygon points="400,60 320,145 480,145" fill="#d4d4d4" stroke="#999" stroke-width="1.5"/>
  <circle cx="400" cy="120" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="400" y="125" text-anchor="middle" font-size="13" fill="#666" font-weight="600">1</text>
  <!-- Level 2 -->
  <polygon points="320,155 240,240 560,240 480,155" fill="#ddd" stroke="#999" stroke-width="1.5"/>
  <circle cx="400" cy="205" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="400" y="210" text-anchor="middle" font-size="13" fill="#666" font-weight="600">2</text>
  <!-- Level 3 -->
  <polygon points="240,250 160,335 640,335 560,250" fill="#e5e5e5" stroke="#999" stroke-width="1.5"/>
  <circle cx="400" cy="300" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="400" y="305" text-anchor="middle" font-size="13" fill="#666" font-weight="600">3</text>
  <!-- Level 4 -->
  <polygon points="160,345 80,430 720,430 640,345" fill="#ededed" stroke="#999" stroke-width="1.5"/>
  <circle cx="400" cy="395" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="400" y="400" text-anchor="middle" font-size="13" fill="#666" font-weight="600">4</text>
  <!-- Level 5 -->
  <polygon points="80,440 30,500 770,500 720,440" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <circle cx="400" cy="475" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="400" y="480" text-anchor="middle" font-size="13" fill="#666" font-weight="600">5</text>
</svg>
