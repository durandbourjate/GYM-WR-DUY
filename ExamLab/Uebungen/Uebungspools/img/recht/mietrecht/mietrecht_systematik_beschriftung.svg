<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="500" fill="#fafafa"/>
  <text x="400" y="35" text-anchor="middle" font-size="16" fill="#666" font-weight="600">Systematik des Mietrechts</text>
  <!-- Root node -->
  <rect x="300" y="60" width="200" height="55" rx="8" fill="#f5f5f5" stroke="#d4d4d4" stroke-width="1.5"/>
  <circle cx="325" cy="87" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="325" y="92" text-anchor="middle" font-size="13" fill="#666" font-weight="600">1</text>
  <!-- Lines to level 2 -->
  <line x1="350" y1="115" x2="200" y2="170" stroke="#d4d4d4" stroke-width="1.5"/>
  <line x1="450" y1="115" x2="600" y2="170" stroke="#d4d4d4" stroke-width="1.5"/>
  <!-- Level 2 left -->
  <rect x="80" y="170" width="240" height="55" rx="8" fill="#f5f5f5" stroke="#d4d4d4" stroke-width="1.5"/>
  <circle cx="105" cy="197" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="105" y="202" text-anchor="middle" font-size="13" fill="#666" font-weight="600">2</text>
  <!-- Level 2 right -->
  <rect x="480" y="170" width="240" height="55" rx="8" fill="#f5f5f5" stroke="#d4d4d4" stroke-width="1.5"/>
  <circle cx="505" cy="197" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="505" y="202" text-anchor="middle" font-size="13" fill="#666" font-weight="600">3</text>
  <!-- Lines to level 3 -->
  <line x1="200" y1="225" x2="150" y2="310" stroke="#d4d4d4" stroke-width="1.5"/>
  <line x1="200" y1="225" x2="350" y2="310" stroke="#d4d4d4" stroke-width="1.5"/>
  <!-- Level 3 -->
  <rect x="50" y="310" width="200" height="55" rx="8" fill="#f5f5f5" stroke="#d4d4d4" stroke-width="1.5"/>
  <circle cx="75" cy="337" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="75" y="342" text-anchor="middle" font-size="13" fill="#666" font-weight="600">4</text>
  <rect x="300" y="310" width="200" height="55" rx="8" fill="#f5f5f5" stroke="#d4d4d4" stroke-width="1.5"/>
  <circle cx="325" cy="337" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="325" y="342" text-anchor="middle" font-size="13" fill="#666" font-weight="600">5</text>
</svg>
