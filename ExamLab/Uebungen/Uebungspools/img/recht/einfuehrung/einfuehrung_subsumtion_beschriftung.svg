<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="500" fill="#fafafa"/>
  <text x="400" y="35" text-anchor="middle" font-size="16" fill="#666" font-weight="600">Subsumtionsschritte</text>
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
  </defs>
  <!-- Step 1 -->
  <rect x="250" y="60" width="300" height="70" rx="8" fill="#f5f5f5" stroke="#d4d4d4" stroke-width="1.5"/>
  <circle cx="280" cy="95" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="280" y="100" text-anchor="middle" font-size="13" fill="#666" font-weight="600">1</text>
  <line x1="400" y1="130" x2="400" y2="160" stroke="#999" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <!-- Step 2 -->
  <rect x="250" y="170" width="300" height="70" rx="8" fill="#f5f5f5" stroke="#d4d4d4" stroke-width="1.5"/>
  <circle cx="280" cy="205" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="280" y="210" text-anchor="middle" font-size="13" fill="#666" font-weight="600">2</text>
  <line x1="400" y1="240" x2="400" y2="270" stroke="#999" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <!-- Step 3 -->
  <rect x="250" y="280" width="300" height="70" rx="8" fill="#f5f5f5" stroke="#d4d4d4" stroke-width="1.5"/>
  <circle cx="280" cy="315" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="280" y="320" text-anchor="middle" font-size="13" fill="#666" font-weight="600">3</text>
  <line x1="400" y1="350" x2="400" y2="380" stroke="#999" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <!-- Step 4 -->
  <rect x="250" y="390" width="300" height="70" rx="8" fill="#f5f5f5" stroke="#d4d4d4" stroke-width="1.5"/>
  <circle cx="280" cy="425" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="280" y="430" text-anchor="middle" font-size="13" fill="#666" font-weight="600">4</text>
</svg>
