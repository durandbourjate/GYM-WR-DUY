<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui,-apple-system,sans-serif">
  <rect width="800" height="500" fill="#fff"/>
  <!-- Outermost layer -->
  <ellipse cx="400" cy="270" rx="350" ry="200" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="2"/>
  <!-- Second layer -->
  <ellipse cx="400" cy="270" rx="280" ry="160" fill="#fff" stroke="#e8e8e8" stroke-width="2"/>
  <!-- Third layer -->
  <ellipse cx="400" cy="270" rx="210" ry="120" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="2"/>
  <!-- Inner core -->
  <ellipse cx="400" cy="270" rx="120" ry="70" fill="#fff" stroke="#e8e8e8" stroke-width="2"/>
  <!-- Numbered markers -->
  <circle cx="400" cy="270" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="400" y="275" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">1</text>
  <circle cx="400" cy="185" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="400" y="190" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">2</text>
  <circle cx="550" cy="270" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="550" y="275" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">3</text>
  <circle cx="640" cy="270" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="640" y="275" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">4</text>
  <circle cx="400" cy="105" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="400" y="110" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">5</text>
  <circle cx="250" cy="370" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="250" y="375" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">6</text>
</svg>