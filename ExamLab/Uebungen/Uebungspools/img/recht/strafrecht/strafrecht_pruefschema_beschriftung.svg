<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui,-apple-system,sans-serif">
  <rect width="800" height="600" fill="#fff"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#999"/>
    </marker>
  </defs>
  <!-- Step 1 -->
  <rect x="250" y="30" width="300" height="60" rx="8" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="2"/>
  <circle cx="240" cy="60" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="240" y="65" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">1</text>
  <!-- Arrow down -->
  <line x1="400" y1="90" x2="400" y2="130" stroke="#999" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Step 2 -->
  <rect x="250" y="135" width="300" height="60" rx="8" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="2"/>
  <circle cx="240" cy="165" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="240" y="170" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">2</text>
  <!-- Arrow down -->
  <line x1="400" y1="195" x2="400" y2="235" stroke="#999" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Step 3 -->
  <rect x="250" y="240" width="300" height="60" rx="8" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="2"/>
  <circle cx="240" cy="270" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="240" y="275" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">3</text>
  <!-- Arrow down -->
  <line x1="400" y1="300" x2="400" y2="340" stroke="#999" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Step 4 -->
  <rect x="250" y="345" width="300" height="60" rx="8" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="2"/>
  <circle cx="240" cy="375" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="240" y="380" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">4</text>
  <!-- Arrow down -->
  <line x1="400" y1="405" x2="400" y2="445" stroke="#999" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Step 5 -->
  <rect x="250" y="450" width="300" height="60" rx="8" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="2"/>
  <circle cx="240" cy="480" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="240" y="485" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">5</text>
</svg>