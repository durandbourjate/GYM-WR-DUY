<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui,-apple-system,sans-serif">
  <rect width="800" height="500" fill="#fff"/>
  <!-- Root node -->
  <rect x="300" y="30" width="200" height="50" rx="8" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="2"/>
  <circle cx="290" cy="55" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="290" y="60" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">1</text>
  <!-- Lines from root to level 2 -->
  <line x1="350" y1="80" x2="200" y2="150" stroke="#999" stroke-width="2"/>
  <line x1="450" y1="80" x2="600" y2="150" stroke="#999" stroke-width="2"/>
  <!-- Level 2 left -->
  <rect x="100" y="150" width="200" height="50" rx="8" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="2"/>
  <circle cx="90" cy="175" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="90" y="180" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">2</text>
  <!-- Level 2 right -->
  <rect x="500" y="150" width="200" height="50" rx="8" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="2"/>
  <circle cx="490" cy="175" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="490" y="180" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">3</text>
  <!-- Lines from level 2 left to level 3 -->
  <line x1="150" y1="200" x2="100" y2="290" stroke="#999" stroke-width="2"/>
  <line x1="250" y1="200" x2="300" y2="290" stroke="#999" stroke-width="2"/>
  <!-- Level 3 nodes -->
  <rect x="20" y="290" width="170" height="50" rx="8" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="2"/>
  <circle cx="10" cy="315" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="10" y="320" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">4</text>
  <rect x="220" y="290" width="170" height="50" rx="8" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="2"/>
  <circle cx="210" cy="315" r="14" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="210" y="320" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">5</text>
</svg>