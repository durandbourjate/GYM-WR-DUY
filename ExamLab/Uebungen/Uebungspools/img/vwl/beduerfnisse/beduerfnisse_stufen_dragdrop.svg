<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Bedürfnispyramide — Ordne die Beispiele den Stufen zu</text>

  <!-- Spalte 1: Grundbedürfnisse (grün) -->
  <rect x="20" y="55" width="140" height="330" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="90" y="78" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" font-weight="700" fill="#16a34a">Grundbed.</text>
  <line x1="35" y1="88" x2="145" y2="88" stroke="#86efac" stroke-width="1"/>
  <text x="90" y="113" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="24" fill="#16a34a">&#9650;</text>
  <!-- Drop-Slots -->
  <rect x="30" y="130" width="120" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="30" y="175" width="120" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Spalte 2: Sicherheit (blau) -->
  <rect x="168" y="55" width="140" height="330" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="238" y="78" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" font-weight="700" fill="#2563eb">Sicherheit</text>
  <line x1="183" y1="88" x2="293" y2="88" stroke="#93c5fd" stroke-width="1"/>
  <text x="238" y="113" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="24" fill="#2563eb">&#9632;</text>
  <!-- Drop-Slots -->
  <rect x="178" y="130" width="120" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="178" y="175" width="120" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Spalte 3: Sozial (gelb) -->
  <rect x="316" y="55" width="140" height="330" rx="8" fill="#fefce8" stroke="#fde047" stroke-width="2"/>
  <text x="386" y="78" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" font-weight="700" fill="#ca8a04">Sozial</text>
  <line x1="331" y1="88" x2="441" y2="88" stroke="#fde047" stroke-width="1"/>
  <text x="386" y="113" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="24" fill="#ca8a04">&#9733;</text>
  <!-- Drop-Slots -->
  <rect x="326" y="130" width="120" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="326" y="175" width="120" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Spalte 4: Wertschätzung (orange) -->
  <rect x="464" y="55" width="140" height="330" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="534" y="78" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" font-weight="700" fill="#ea580c">Wertschätzung</text>
  <line x1="479" y1="88" x2="589" y2="88" stroke="#fdba74" stroke-width="1"/>
  <text x="534" y="113" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="24" fill="#ea580c">&#9679;</text>
  <!-- Drop-Slots -->
  <rect x="474" y="130" width="120" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="474" y="175" width="120" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Spalte 5: Selbstverwirklichung (violett) -->
  <rect x="612" y="55" width="168" height="330" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="2"/>
  <text x="696" y="78" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" font-weight="700" fill="#7c3aed">Selbstverw.</text>
  <line x1="627" y1="88" x2="765" y2="88" stroke="#c4b5fd" stroke-width="1"/>
  <text x="696" y="113" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="24" fill="#7c3aed">&#9670;</text>
  <!-- Drop-Slots -->
  <rect x="622" y="130" width="148" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="622" y="175" width="148" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Hinweis -->
  <text x="400" y="392" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#94a3b8">Ziehe die Begriffe in die passende Kategorie</text>
</svg>
