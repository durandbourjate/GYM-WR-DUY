<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="550" fill="#f5f5f5"/>
  <!-- Pyramid levels from bottom (E=bottom, A=top) -->
  <!-- Level E (bottom) -->
  <polygon points="80,480 720,480 640,400 160,400" fill="#d4d4d4" stroke="#999" stroke-width="1.5"/>
  <circle cx="400" cy="440" r="18" fill="white" stroke="#666" stroke-width="2"/>
  <text x="400" y="447" text-anchor="middle" font-size="18" font-weight="bold" fill="#666">E</text>
  <!-- Level D -->
  <polygon points="160,400 640,400 560,320 240,320" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <circle cx="400" cy="360" r="18" fill="white" stroke="#666" stroke-width="2"/>
  <text x="400" y="367" text-anchor="middle" font-size="18" font-weight="bold" fill="#666">D</text>
  <!-- Level C -->
  <polygon points="240,320 560,320 480,240 320,240" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <circle cx="400" cy="280" r="18" fill="white" stroke="#666" stroke-width="2"/>
  <text x="400" y="287" text-anchor="middle" font-size="18" font-weight="bold" fill="#666">C</text>
  <!-- Level B -->
  <polygon points="320,240 480,240 440,160 360,160" fill="#efefef" stroke="#999" stroke-width="1.5"/>
  <circle cx="400" cy="200" r="18" fill="white" stroke="#666" stroke-width="2"/>
  <text x="400" y="207" text-anchor="middle" font-size="18" font-weight="bold" fill="#666">B</text>
  <!-- Level A (top) -->
  <polygon points="360,160 440,160 400,80" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <circle cx="400" cy="125" r="18" fill="white" stroke="#666" stroke-width="2"/>
  <text x="400" y="132" text-anchor="middle" font-size="18" font-weight="bold" fill="#666">A</text>
</svg>
