<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui,-apple-system,sans-serif">
<rect width="800" height="500" fill="#fff"/>
<text x="400" y="30" text-anchor="middle" fill="#666" font-size="14">Beschrifte die Geldmengenaggregate</text>
<!-- 4 concentric rings -->
<ellipse cx="400" cy="280" rx="340" ry="200" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
<ellipse cx="400" cy="280" rx="260" ry="155" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
<ellipse cx="400" cy="280" rx="180" ry="110" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
<ellipse cx="400" cy="280" rx="90" ry="60" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
<!-- 5 numbered markers -->
<circle cx="400" cy="280" r="12" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="400" y="285" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">1</text>
<circle cx="400" cy="195" r="12" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="400" y="200" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">2</text>
<circle cx="400" cy="140" r="12" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="400" y="145" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">3</text>
<circle cx="400" cy="90" r="12" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="400" y="95" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">4</text>
<circle cx="680" cy="280" r="12" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="680" y="285" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">5</text>
</svg>