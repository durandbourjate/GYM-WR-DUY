<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui,-apple-system,sans-serif">
<rect width="800" height="500" fill="#fff"/>
<text x="400" y="30" text-anchor="middle" fill="#666" font-size="14">Beschrifte die Ebenen</text>
<!-- 3 stacked layers -->
<rect x="100" y="60" width="600" height="120" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
<rect x="100" y="200" width="600" height="120" rx="6" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
<rect x="100" y="340" width="600" height="120" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
<!-- 6 numbered markers (2 per layer) -->
<circle cx="250" cy="120" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="250" y="125" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">1</text>
<circle cx="550" cy="120" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="550" y="125" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">2</text>
<circle cx="250" cy="260" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="250" y="265" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">3</text>
<circle cx="550" cy="260" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="550" y="265" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">4</text>
<circle cx="250" cy="400" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="250" y="405" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">5</text>
<circle cx="550" cy="400" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="550" y="405" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">6</text>
</svg>