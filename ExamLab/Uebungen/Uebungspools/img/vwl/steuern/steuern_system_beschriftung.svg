<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui,-apple-system,sans-serif">
<rect width="800" height="500" fill="#fff"/>
<text x="400" y="30" text-anchor="middle" fill="#666" font-size="14">Beschrifte die Ebenen des Steuersystems</text>
<!-- Top node -->
<rect x="280" y="50" width="240" height="50" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
<circle cx="280" cy="75" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="280" y="80" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">1</text>
<!-- Lines from top to level 2 -->
<line x1="340" y1="100" x2="200" y2="170" stroke="#999" stroke-width="1.5"/>
<line x1="400" y1="100" x2="400" y2="170" stroke="#999" stroke-width="1.5"/>
<line x1="460" y1="100" x2="600" y2="170" stroke="#999" stroke-width="1.5"/>
<!-- Level 2: 3 nodes -->
<rect x="80" y="170" width="240" height="50" rx="6" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
<circle cx="80" cy="195" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="80" y="200" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">2</text>
<rect x="280" y="170" width="240" height="50" rx="6" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
<circle cx="280" cy="195" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="280" y="200" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">3</text>
<rect x="480" y="170" width="240" height="50" rx="6" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
<circle cx="480" cy="195" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="480" y="200" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">4</text>
<!-- Lines from level 2 to level 3 -->
<line x1="200" y1="220" x2="150" y2="310" stroke="#999" stroke-width="1.5"/>
<line x1="400" y1="220" x2="400" y2="310" stroke="#999" stroke-width="1.5"/>
<line x1="600" y1="220" x2="650" y2="310" stroke="#999" stroke-width="1.5"/>
<!-- Level 3: 3 leaf nodes -->
<rect x="30" y="310" width="240" height="50" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
<circle cx="30" cy="335" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="30" y="340" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">5</text>
<rect x="530" y="310" width="240" height="50" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
<circle cx="530" cy="335" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="530" y="340" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">6</text>
</svg>