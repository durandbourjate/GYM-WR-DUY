<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui,-apple-system,sans-serif">
<rect width="800" height="500" fill="#fff"/>
<text x="400" y="30" text-anchor="middle" fill="#666" font-size="14">Klicke auf den richtigen Punkt</text>
<!-- Axes -->
<line x1="100" y1="420" x2="720" y2="420" stroke="#999" stroke-width="1.5"/>
<line x1="100" y1="420" x2="100" y2="60" stroke="#999" stroke-width="1.5"/>
<text x="410" y="460" text-anchor="middle" fill="#666" font-size="13">Steuersatz (0% - 100%)</text>
<text x="50" y="240" text-anchor="middle" fill="#666" font-size="13" transform="rotate(-90,50,240)">Steuereinnahmen</text>
<!-- Axis endpoints -->
<text x="120" y="445" fill="#666" font-size="11">0%</text>
<text x="690" y="445" fill="#666" font-size="11">100%</text>
<!-- Laffer curve (inverted U) -->
<path d="M120,420 C200,400 280,180 400,120 C520,180 600,400 700,420" fill="none" stroke="#999" stroke-width="2"/>
<!-- Points A, B, C -->
<circle cx="260" cy="220" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="260" y="225" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">A</text>
<circle cx="400" cy="120" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="400" y="125" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">B</text>
<circle cx="560" cy="260" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="560" y="265" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">C</text>
</svg>