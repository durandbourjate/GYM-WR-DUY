<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui,-apple-system,sans-serif">
<rect width="800" height="500" fill="#fff"/>
<text x="400" y="30" text-anchor="middle" fill="#666" font-size="14">Beschrifte die markierten Elemente</text>
<!-- Axes -->
<line x1="100" y1="420" x2="720" y2="420" stroke="#999" stroke-width="1.5"/>
<line x1="100" y1="420" x2="100" y2="60" stroke="#999" stroke-width="1.5"/>
<text x="410" y="460" text-anchor="middle" fill="#666" font-size="13">Menge</text>
<text x="50" y="240" text-anchor="middle" fill="#666" font-size="13" transform="rotate(-90,50,240)">Preis</text>
<!-- Supply curve -->
<line x1="150" y1="380" x2="650" y2="120" stroke="#999" stroke-width="2"/>
<!-- Demand curve -->
<line x1="150" y1="120" x2="650" y2="380" stroke="#999" stroke-width="2"/>
<!-- 6 numbered markers -->
<circle cx="280" cy="190" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="280" y="195" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">1</text>
<circle cx="520" cy="190" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="520" y="195" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">2</text>
<circle cx="400" cy="250" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="400" y="255" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">3</text>
<circle cx="280" cy="310" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="280" y="315" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">4</text>
<circle cx="520" cy="310" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="520" y="315" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">5</text>
<circle cx="400" cy="420" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="400" y="425" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">6</text>
</svg>