<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui,-apple-system,sans-serif">
<rect width="800" height="500" fill="#fff"/>
<text x="400" y="30" text-anchor="middle" fill="#666" font-size="14">Beschrifte die Elemente des Kreislaufs</text>
<!-- 5 nodes in a circle -->
<circle cx="400" cy="100" r="40" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
<circle cx="600" cy="220" r="40" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
<circle cx="530" cy="400" r="40" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
<circle cx="270" cy="400" r="40" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
<circle cx="200" cy="220" r="40" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
<!-- Arrows connecting nodes clockwise -->
<line x1="435" y1="115" x2="565" y2="200" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="615" y1="260" x2="555" y2="370" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="490" y1="410" x2="315" y2="410" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="245" y1="375" x2="195" y2="260" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="225" y1="190" x2="365" y2="115" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Arrow marker -->
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M 0 0 L 10 5 L 0 10 z" fill="#999"/>
</marker>
</defs>
<!-- Numbered markers -->
<text x="400" y="106" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">1</text>
<text x="600" y="226" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">2</text>
<text x="530" y="406" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">3</text>
<text x="270" y="406" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">4</text>
<text x="200" y="226" text-anchor="middle" fill="#666" font-size="14" font-weight="bold">5</text>
</svg>