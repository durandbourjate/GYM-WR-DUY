<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="500" fill="#f5f5f5"/>
  <!-- Triangle representing 3 approaches -->
  <polygon points="400,60 120,420 680,420" fill="none" stroke="#999" stroke-width="2.5"/>
  <!-- Dividing lines from center to vertices -->
  <line x1="400" y1="250" x2="400" y2="60" stroke="#d4d4d4" stroke-width="1.5"/>
  <line x1="400" y1="250" x2="120" y2="420" stroke="#d4d4d4" stroke-width="1.5"/>
  <line x1="400" y1="250" x2="680" y2="420" stroke="#d4d4d4" stroke-width="1.5"/>
  <!-- Center point -->
  <circle cx="400" cy="250" r="6" fill="#999"/>
  <!-- Marker 1: Top section -->
  <circle cx="400" cy="150" r="16" fill="white" stroke="#666" stroke-width="2"/>
  <text x="400" y="156" text-anchor="middle" font-size="14" font-weight="bold" fill="#666">1</text>
  <!-- Marker 2: Bottom-left section -->
  <circle cx="280" cy="350" r="16" fill="white" stroke="#666" stroke-width="2"/>
  <text x="280" y="356" text-anchor="middle" font-size="14" font-weight="bold" fill="#666">2</text>
  <!-- Marker 3: Bottom-right section -->
  <circle cx="520" cy="350" r="16" fill="white" stroke="#666" stroke-width="2"/>
  <text x="520" y="356" text-anchor="middle" font-size="14" font-weight="bold" fill="#666">3</text>
  <!-- Marker 4: Top vertex -->
  <circle cx="400" cy="45" r="16" fill="white" stroke="#666" stroke-width="2"/>
  <text x="400" y="51" text-anchor="middle" font-size="14" font-weight="bold" fill="#666">4</text>
  <!-- Marker 5: Bottom-left vertex -->
  <circle cx="105" cy="435" r="16" fill="white" stroke="#666" stroke-width="2"/>
  <text x="105" y="441" text-anchor="middle" font-size="14" font-weight="bold" fill="#666">5</text>
  <!-- Marker 6: Bottom-right vertex -->
  <circle cx="695" cy="435" r="16" fill="white" stroke="#666" stroke-width="2"/>
  <text x="695" y="441" text-anchor="middle" font-size="14" font-weight="bold" fill="#666">6</text>
</svg>
