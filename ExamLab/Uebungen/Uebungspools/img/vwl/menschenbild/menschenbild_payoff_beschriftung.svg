<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui,-apple-system,sans-serif">
<rect width="800" height="500" fill="#fff"/>
<text x="400" y="30" text-anchor="middle" fill="#666" font-size="14">Beschrifte die Elemente der Payoff-Matrix</text>
<!-- Row/Column headers -->
<text x="400" y="70" text-anchor="middle" fill="#666" font-size="13">Spieler 2</text>
<text x="100" y="260" text-anchor="middle" fill="#666" font-size="13" transform="rotate(-90,100,260)">Spieler 1</text>
<!-- Strategy labels -->
<text x="310" y="100" text-anchor="middle" fill="#666" font-size="12">Strategie I</text>
<text x="530" y="100" text-anchor="middle" fill="#666" font-size="12">Strategie II</text>
<text x="165" y="210" text-anchor="middle" fill="#666" font-size="12">Strategie I</text>
<text x="165" y="350" text-anchor="middle" fill="#666" font-size="12">Strategie II</text>
<!-- Grid -->
<rect x="200" y="110" width="220" height="140" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
<rect x="420" y="110" width="220" height="140" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
<rect x="200" y="250" width="220" height="140" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
<rect x="420" y="250" width="220" height="140" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
<!-- 6 numbered markers -->
<circle cx="310" cy="180" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="310" y="185" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">1</text>
<circle cx="530" cy="180" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="530" y="185" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">2</text>
<circle cx="310" cy="320" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="310" y="325" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">3</text>
<circle cx="530" cy="320" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="530" y="325" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">4</text>
<circle cx="200" cy="180" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="200" y="185" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">5</text>
<circle cx="640" cy="320" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="640" y="325" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">6</text>
</svg>