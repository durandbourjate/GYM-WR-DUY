<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui,-apple-system,sans-serif">
<rect width="800" height="500" fill="#fff"/>
<text x="400" y="30" text-anchor="middle" fill="#666" font-size="14">Beschrifte die markierten Stellen</text>
<!-- Base -->
<rect x="80" y="420" width="640" height="40" rx="4" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
<!-- 3 pillars -->
<rect x="120" y="100" width="160" height="320" rx="4" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
<rect x="320" y="100" width="160" height="320" rx="4" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
<rect x="520" y="100" width="160" height="320" rx="4" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
<!-- 6 numbered markers -->
<circle cx="200" cy="200" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="200" y="205" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">1</text>
<circle cx="400" cy="200" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="400" y="205" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">2</text>
<circle cx="600" cy="200" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="600" y="205" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">3</text>
<circle cx="200" cy="340" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="200" y="345" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">4</text>
<circle cx="400" cy="340" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="400" y="345" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">5</text>
<circle cx="600" cy="340" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="600" y="345" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">6</text>
</svg>