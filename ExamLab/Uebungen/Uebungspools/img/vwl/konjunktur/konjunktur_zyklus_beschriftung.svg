<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui,-apple-system,sans-serif">
<rect width="800" height="500" fill="#fff"/>
<text x="400" y="30" text-anchor="middle" fill="#666" font-size="14">Beschrifte die vier Konjunkturphasen</text>
<!-- Axes -->
<line x1="80" y1="420" x2="750" y2="420" stroke="#999" stroke-width="1.5"/>
<line x1="80" y1="420" x2="80" y2="60" stroke="#999" stroke-width="1.5"/>
<text x="415" y="460" text-anchor="middle" fill="#666" font-size="13">Zeit</text>
<text x="40" y="240" text-anchor="middle" fill="#666" font-size="13" transform="rotate(-90,40,240)">BIP</text>
<!-- Trend line -->
<line x1="100" y1="360" x2="730" y2="180" stroke="#999" stroke-width="1" stroke-dasharray="6 3"/>
<!-- Sine wave over trend -->
<path d="M100,340 C180,280 220,180 300,200 C380,220 400,320 480,300 C560,280 580,160 660,190 C700,200 720,220 730,210" fill="none" stroke="#999" stroke-width="2"/>
<!-- Markers 1-4 at four phases -->
<circle cx="210" cy="200" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="210" y="205" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">1</text>
<circle cx="350" cy="260" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="350" y="265" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">2</text>
<circle cx="480" cy="300" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="480" y="305" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">3</text>
<circle cx="580" cy="210" r="14" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="580" y="215" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">4</text>
</svg>