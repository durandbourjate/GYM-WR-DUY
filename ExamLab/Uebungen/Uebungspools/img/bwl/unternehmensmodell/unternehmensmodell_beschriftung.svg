<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff"/>

  <!-- Outermost ring -->
  <circle cx="400" cy="260" r="210" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="1.5"/>

  <!-- Middle ring -->
  <circle cx="400" cy="260" r="155" fill="#e8e8e8" stroke="#d0d0d0" stroke-width="1.5"/>

  <!-- Inner ring -->
  <circle cx="400" cy="260" r="100" fill="#e0e0e0" stroke="#d0d0d0" stroke-width="1.5"/>

  <!-- Center circle -->
  <circle cx="400" cy="260" r="50" fill="#d5d5d5" stroke="#999999" stroke-width="2"/>

  <!-- Arrows pointing outward (interaction flows) -->
  <line x1="400" y1="210" x2="400" y2="110" stroke="#bbb" stroke-width="1.5"/>
  <polygon points="400,105 395,115 405,115" fill="#bbb"/>

  <line x1="450" y1="260" x2="550" y2="260" stroke="#bbb" stroke-width="1.5"/>
  <polygon points="555,260 545,255 545,265" fill="#bbb"/>

  <line x1="400" y1="310" x2="400" y2="410" stroke="#bbb" stroke-width="1.5"/>
  <polygon points="400,415 395,405 405,405" fill="#bbb"/>

  <line x1="350" y1="260" x2="250" y2="260" stroke="#bbb" stroke-width="1.5"/>
  <polygon points="245,260 255,255 255,265" fill="#bbb"/>

  <!-- Numbered markers at various positions -->
  <!-- Marker 1 (top) -->
  <circle cx="400" cy="30" r="16" fill="#e0e0e0" stroke="#999999" stroke-width="1.5"/>
  <text x="400" y="36" text-anchor="middle" fill="#666666" font-size="14" font-weight="600">1</text>

  <!-- Marker 2 (top-right) -->
  <circle cx="630" cy="120" r="16" fill="#e0e0e0" stroke="#999999" stroke-width="1.5"/>
  <text x="630" y="126" text-anchor="middle" fill="#666666" font-size="14" font-weight="600">2</text>

  <!-- Marker 3 (right) -->
  <circle cx="680" cy="300" r="16" fill="#e0e0e0" stroke="#999999" stroke-width="1.5"/>
  <text x="680" y="306" text-anchor="middle" fill="#666666" font-size="14" font-weight="600">3</text>

  <!-- Marker 4 (bottom) -->
  <circle cx="400" cy="485" r="16" fill="#e0e0e0" stroke="#999999" stroke-width="1.5"/>
  <text x="400" y="491" text-anchor="middle" fill="#666666" font-size="14" font-weight="600">4</text>

  <!-- Marker 5 (left) -->
  <circle cx="120" cy="300" r="16" fill="#e0e0e0" stroke="#999999" stroke-width="1.5"/>
  <text x="120" y="306" text-anchor="middle" fill="#666666" font-size="14" font-weight="600">5</text>

  <!-- Marker 6 (top-left) -->
  <circle cx="170" cy="120" r="16" fill="#e0e0e0" stroke="#999999" stroke-width="1.5"/>
  <text x="170" y="126" text-anchor="middle" fill="#666666" font-size="14" font-weight="600">6</text>
</svg>