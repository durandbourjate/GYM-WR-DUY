<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff"/>

  <!-- Outermost ring D -->
  <circle cx="400" cy="250" r="220" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="400" y="55" text-anchor="middle" fill="#999999" font-size="18" font-weight="300">D</text>

  <!-- Ring C -->
  <circle cx="400" cy="250" r="165" fill="#e8e8e8" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="580" y="130" text-anchor="middle" fill="#999999" font-size="18" font-weight="300">C</text>

  <!-- Ring B -->
  <circle cx="400" cy="250" r="110" fill="#e0e0e0" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="490" y="180" text-anchor="middle" fill="#999999" font-size="18" font-weight="300">B</text>

  <!-- Center circle A (Unternehmen) -->
  <circle cx="400" cy="250" r="55" fill="#d5d5d5" stroke="#999999" stroke-width="2"/>
  <text x="400" y="256" text-anchor="middle" fill="#666666" font-size="18" font-weight="300">A</text>
</svg>