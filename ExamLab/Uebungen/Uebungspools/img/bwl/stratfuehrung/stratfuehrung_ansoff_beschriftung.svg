<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff"/>

  <!-- X-axis label -->
  <text x="450" y="48" text-anchor="middle" fill="#666666" font-size="15" font-weight="600">Produkte</text>
  <text x="300" y="75" text-anchor="middle" fill="#666666" font-size="13">bestehend</text>
  <text x="600" y="75" text-anchor="middle" fill="#666666" font-size="13">neu</text>
  <!-- X-axis arrow -->
  <line x1="200" y1="60" x2="700" y2="60" stroke="#d0d0d0" stroke-width="1"/>
  <polygon points="705,60 695,55 695,65" fill="#d0d0d0"/>

  <!-- Y-axis label -->
  <text x="48" y="280" text-anchor="middle" fill="#666666" font-size="15" font-weight="600" transform="rotate(-90,48,280)">Maerkte</text>
  <text x="110" y="215" text-anchor="end" fill="#666666" font-size="13">bestehend</text>
  <text x="110" y="395" text-anchor="end" fill="#666666" font-size="13">neu</text>
  <!-- Y-axis arrow -->
  <line x1="80" y1="130" x2="80" y2="440" stroke="#d0d0d0" stroke-width="1"/>
  <polygon points="80,445 75,435 85,435" fill="#d0d0d0"/>

  <!-- Grid border -->
  <rect x="140" y="100" width="600" height="360" fill="none" stroke="#999999" stroke-width="2" rx="4"/>

  <!-- Grid dividers -->
  <line x1="440" y1="100" x2="440" y2="460" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="140" y1="280" x2="740" y2="280" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Quadrant 1 (top-left) -->
  <rect x="142" y="102" width="296" height="176" fill="#f5f5f5" stroke="none"/>
  <text x="290" y="198" text-anchor="middle" fill="#999999" font-size="28" font-weight="300">1</text>

  <!-- Quadrant 2 (top-right) -->
  <rect x="442" y="102" width="296" height="176" fill="#ebebeb" stroke="none"/>
  <text x="590" y="198" text-anchor="middle" fill="#999999" font-size="28" font-weight="300">2</text>

  <!-- Quadrant 3 (bottom-left) -->
  <rect x="142" y="282" width="296" height="176" fill="#ebebeb" stroke="none"/>
  <text x="290" y="378" text-anchor="middle" fill="#999999" font-size="28" font-weight="300">3</text>

  <!-- Quadrant 4 (bottom-right) -->
  <rect x="442" y="282" width="296" height="176" fill="#f5f5f5" stroke="none"/>
  <text x="590" y="378" text-anchor="middle" fill="#999999" font-size="28" font-weight="300">4</text>
</svg>