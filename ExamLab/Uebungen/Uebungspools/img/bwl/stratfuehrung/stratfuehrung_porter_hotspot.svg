<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff"/>

  <!-- Y-axis label -->
  <text x="28" y="270" text-anchor="middle" fill="#666666" font-size="13" font-weight="500" transform="rotate(-90,28,270)">Strategisches Zielobjekt</text>

  <!-- X-axis label -->
  <text x="450" y="490" text-anchor="middle" fill="#666666" font-size="13" font-weight="500">Strategischer Vorteil</text>

  <!-- Y-axis: Branche (top) / Segment (bottom) -->
  <text x="80" y="180" text-anchor="middle" fill="#666666" font-size="13">Branche</text>
  <text x="80" y="370" text-anchor="middle" fill="#666666" font-size="13">Segment</text>

  <!-- X-axis: Einzigartigkeit (left) / Kostenvorsprung (right) -->
  <text x="300" y="75" text-anchor="middle" fill="#666666" font-size="13">Einzigartigkeit</text>
  <text x="600" y="75" text-anchor="middle" fill="#666666" font-size="13">Kostenvorsprung</text>

  <!-- Outer border -->
  <rect x="120" y="90" width="640" height="370" fill="none" stroke="#999999" stroke-width="2" rx="4"/>

  <!-- Horizontal divider -->
  <line x1="120" y1="275" x2="760" y2="275" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Vertical divider (only in top row) -->
  <line x1="440" y1="90" x2="440" y2="275" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Quadrant A (top-left: Differenzierung) -->
  <rect x="122" y="92" width="316" height="181" fill="#f5f5f5" stroke="none"/>
  <text x="280" y="190" text-anchor="middle" fill="#999999" font-size="28" font-weight="300">A</text>

  <!-- Quadrant B (top-right: Kostenfuehrerschaft) -->
  <rect x="442" y="92" width="316" height="181" fill="#ebebeb" stroke="none"/>
  <text x="600" y="190" text-anchor="middle" fill="#999999" font-size="28" font-weight="300">B</text>

  <!-- Quadrant C (bottom spanning: Nischenstrategie) -->
  <rect x="122" y="277" width="636" height="181" fill="#f0f0f0" stroke="none"/>
  <text x="440" y="375" text-anchor="middle" fill="#999999" font-size="28" font-weight="300">C</text>
</svg>