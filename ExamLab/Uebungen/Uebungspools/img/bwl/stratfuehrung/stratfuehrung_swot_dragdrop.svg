<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff"/>

  <!-- Axis labels -->
  <text x="275" y="35" text-anchor="middle" fill="#666666" font-size="14" font-weight="500">Positiv</text>
  <text x="575" y="35" text-anchor="middle" fill="#666666" font-size="14" font-weight="500">Negativ</text>
  <text x="55" y="185" text-anchor="middle" fill="#666666" font-size="14" font-weight="500" transform="rotate(-90,55,185)">Intern</text>
  <text x="55" y="385" text-anchor="middle" fill="#666666" font-size="14" font-weight="500" transform="rotate(-90,55,385)">Extern</text>

  <!-- Grid border -->
  <rect x="100" y="50" width="650" height="420" fill="none" stroke="#999999" stroke-width="2" rx="4"/>

  <!-- Dividers -->
  <line x1="425" y1="50" x2="425" y2="470" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="100" y1="260" x2="750" y2="260" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Zone S (top-left) -->
  <rect x="102" y="52" width="321" height="206" fill="#fafafa" stroke="none"/>
  <text x="263" y="70" text-anchor="middle" fill="#666666" font-size="18" font-weight="600">S</text>
  <rect x="115" y="80" width="295" height="165" fill="none" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3" rx="4"/>

  <!-- Zone W (top-right) -->
  <rect x="427" y="52" width="321" height="206" fill="#fafafa" stroke="none"/>
  <text x="588" y="70" text-anchor="middle" fill="#666666" font-size="18" font-weight="600">W</text>
  <rect x="440" y="80" width="295" height="165" fill="none" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3" rx="4"/>

  <!-- Zone O (bottom-left) -->
  <rect x="102" y="262" width="321" height="206" fill="#fafafa" stroke="none"/>
  <text x="263" y="280" text-anchor="middle" fill="#666666" font-size="18" font-weight="600">O</text>
  <rect x="115" y="290" width="295" height="165" fill="none" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3" rx="4"/>

  <!-- Zone T (bottom-right) -->
  <rect x="427" y="262" width="321" height="206" fill="#fafafa" stroke="none"/>
  <text x="588" y="280" text-anchor="middle" fill="#666666" font-size="18" font-weight="600">T</text>
  <rect x="440" y="290" width="295" height="165" fill="none" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3" rx="4"/>
</svg>