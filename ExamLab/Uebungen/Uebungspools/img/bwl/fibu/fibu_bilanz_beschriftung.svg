<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff"/>

  <!-- T-shape: vertical center line -->
  <line x1="400" y1="40" x2="400" y2="420" stroke="#999999" stroke-width="2"/>
  <!-- T-shape: top horizontal line -->
  <line x1="40" y1="40" x2="760" y2="40" stroke="#999999" stroke-width="2"/>

  <!-- LEFT SIDE (2 rows) - light blue tones -->
  <!-- Top left area -->
  <rect x="42" y="42" width="356" height="188" fill="#e8f0fe" stroke="none" rx="2"/>
  <!-- Bottom left area -->
  <rect x="42" y="232" width="356" height="186" fill="#d0e2fc" stroke="none" rx="2"/>

  <!-- Left side horizontal divider -->
  <line x1="42" y1="230" x2="398" y2="230" stroke="#b0c8e8" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- RIGHT SIDE (3 rows) - light pink tones -->
  <!-- Top right area -->
  <rect x="402" y="42" width="356" height="122" fill="#fde8e8" stroke="none" rx="2"/>
  <!-- Middle right area -->
  <rect x="402" y="166" width="356" height="122" fill="#f5d0d0" stroke="none" rx="2"/>
  <!-- Bottom right area -->
  <rect x="402" y="290" width="356" height="128" fill="#ecc0c0" stroke="none" rx="2"/>

  <!-- Right side horizontal dividers -->
  <line x1="402" y1="164" x2="758" y2="164" stroke="#d4a8a8" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="402" y1="288" x2="758" y2="288" stroke="#d4a8a8" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Bottom bar (Bilanzsumme) -->
  <rect x="40" y="420" width="720" height="50" fill="#f0f0f0" stroke="#999999" stroke-width="1.5" rx="4"/>

  <!-- Outer border -->
  <rect x="40" y="40" width="720" height="380" fill="none" stroke="#999999" stroke-width="2" rx="4"/>

  <!-- Balance line in bottom bar -->
  <line x1="400" y1="420" x2="400" y2="470" stroke="#999999" stroke-width="1.5"/>
</svg>