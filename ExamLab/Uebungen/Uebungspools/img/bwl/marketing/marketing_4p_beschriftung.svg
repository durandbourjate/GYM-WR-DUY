<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff"/>

  <!-- 2x2 Grid of equal rectangles -->

  <!-- Quadrant 1 (top-left) -->
  <rect x="60" y="40" width="320" height="195" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="8,5" rx="8"/>
  <text x="220" y="145" text-anchor="middle" fill="#999999" font-size="32" font-weight="300">1</text>

  <!-- Quadrant 2 (top-right) -->
  <rect x="420" y="40" width="320" height="195" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="8,5" rx="8"/>
  <text x="580" y="145" text-anchor="middle" fill="#999999" font-size="32" font-weight="300">2</text>

  <!-- Quadrant 3 (bottom-left) -->
  <rect x="60" y="265" width="320" height="195" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="8,5" rx="8"/>
  <text x="220" y="370" text-anchor="middle" fill="#999999" font-size="32" font-weight="300">3</text>

  <!-- Quadrant 4 (bottom-right) -->
  <rect x="420" y="265" width="320" height="195" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="8,5" rx="8"/>
  <text x="580" y="370" text-anchor="middle" fill="#999999" font-size="32" font-weight="300">4</text>

  <!-- Center circle connecting them -->
  <circle cx="400" cy="250" r="40" fill="#e0e0e0" stroke="#999999" stroke-width="1.5"/>
  <text x="400" y="256" text-anchor="middle" fill="#666666" font-size="14" font-weight="500">Mix</text>
</svg>