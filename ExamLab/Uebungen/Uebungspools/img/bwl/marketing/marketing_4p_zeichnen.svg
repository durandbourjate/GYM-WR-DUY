<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#ffffff" rx="8"/>
  <text x="400" y="32" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Marketing-Mix: Die 4 P</text>
  <!-- Center circle -->
  <circle cx="400" cy="225" r="60" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="400" y="218" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#1e293b">Marketing-</text>
  <text x="400" y="236" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#1e293b">Mix</text>
  <!-- Connecting lines -->
  <line x1="340" y1="185" x2="240" y2="120" stroke="#3b82f6" stroke-width="2"/>
  <line x1="460" y1="185" x2="560" y2="120" stroke="#3b82f6" stroke-width="2"/>
  <line x1="340" y1="265" x2="240" y2="330" stroke="#3b82f6" stroke-width="2"/>
  <line x1="460" y1="265" x2="560" y2="330" stroke="#3b82f6" stroke-width="2"/>
  <!-- Product (top-left) -->
  <rect x="60" y="55" width="230" height="115" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="175" y="82" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#3b82f6">Product (Produkt)</text>
  <line x1="80" y1="92" x2="270" y2="92" stroke="#dbeafe" stroke-width="1"/>
  <text x="175" y="112" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#64748b">Qualitaet, Design, Marke</text>
  <text x="175" y="128" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#64748b">Sortiment, Verpackung</text>
  <text x="175" y="144" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#64748b">Service, Garantie</text>
  <!-- Price (top-right) -->
  <rect x="510" y="55" width="230" height="115" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="625" y="82" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#3b82f6">Price (Preis)</text>
  <line x1="530" y1="92" x2="720" y2="92" stroke="#dbeafe" stroke-width="1"/>
  <text x="625" y="112" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#64748b">Listenpreis, Rabatte</text>
  <text x="625" y="128" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#64748b">Zahlungsbedingungen</text>
  <text x="625" y="144" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#64748b">Preisstrategie, Skonto</text>
  <!-- Place (bottom-left) -->
  <rect x="60" y="280" width="230" height="115" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="175" y="307" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#3b82f6">Place (Distribution)</text>
  <line x1="80" y1="317" x2="270" y2="317" stroke="#dbeafe" stroke-width="1"/>
  <text x="175" y="337" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#64748b">Absatzwege, Standort</text>
  <text x="175" y="353" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#64748b">Lagerhaltung, Transport</text>
  <text x="175" y="369" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#64748b">Online / stationaer</text>
  <!-- Promotion (bottom-right) -->
  <rect x="510" y="280" width="230" height="115" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="625" y="307" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#3b82f6">Promotion (Komm.)</text>
  <line x1="530" y1="317" x2="720" y2="317" stroke="#dbeafe" stroke-width="1"/>
  <text x="625" y="337" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#64748b">Werbung, PR</text>
  <text x="625" y="353" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#64748b">Verkaufsfoerderung</text>
  <text x="625" y="369" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#64748b">Social Media, Sponsoring</text>
  <!-- Zielgruppe label -->
  <text x="400" y="435" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">Alle 4 P muessen auf die Zielgruppe abgestimmt sein.</text>
</svg>