<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff"/>

  <!-- Y-axis -->
  <line x1="120" y1="40" x2="120" y2="440" stroke="#666666" stroke-width="2"/>
  <!-- Y-axis arrow -->
  <polygon points="120,35 115,48 125,48" fill="#666666"/>

  <!-- X-axis -->
  <line x1="120" y1="440" x2="760" y2="440" stroke="#666666" stroke-width="2"/>
  <!-- X-axis arrow -->
  <polygon points="765,440 752,435 752,445" fill="#666666"/>

  <!-- Y-axis label -->
  <text x="30" y="245" text-anchor="middle" fill="#666666" font-size="14" font-weight="500" transform="rotate(-90,30,245)">Marktwachstum</text>
  <text x="70" y="80" text-anchor="middle" fill="#666666" font-size="13">hoch</text>
  <text x="70" y="420" text-anchor="middle" fill="#666666" font-size="13">niedrig</text>

  <!-- X-axis label -->
  <text x="440" y="490" text-anchor="middle" fill="#666666" font-size="14" font-weight="500">Relativer Marktanteil</text>
  <text x="280" y="470" text-anchor="middle" fill="#666666" font-size="13">hoch</text>
  <text x="600" y="470" text-anchor="middle" fill="#666666" font-size="13">niedrig</text>

  <!-- Grid divider lines -->
  <line x1="440" y1="40" x2="440" y2="440" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="120" y1="240" x2="760" y2="240" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Quadrant A (top-left) -->
  <rect x="122" y="42" width="316" height="196" fill="#f5f5f5" stroke="none"/>
  <text x="280" y="145" text-anchor="middle" fill="#999999" font-size="28" font-weight="300">A</text>

  <!-- Quadrant B (top-right) -->
  <rect x="442" y="42" width="316" height="196" fill="#ebebeb" stroke="none"/>
  <text x="600" y="145" text-anchor="middle" fill="#999999" font-size="28" font-weight="300">B</text>

  <!-- Quadrant C (bottom-left) -->
  <rect x="122" y="242" width="316" height="196" fill="#ebebeb" stroke="none"/>
  <text x="280" y="345" text-anchor="middle" fill="#999999" font-size="28" font-weight="300">C</text>

  <!-- Quadrant D (bottom-right) -->
  <rect x="442" y="242" width="316" height="196" fill="#f5f5f5" stroke="none"/>
  <text x="600" y="345" text-anchor="middle" fill="#999999" font-size="28" font-weight="300">D</text>
</svg>