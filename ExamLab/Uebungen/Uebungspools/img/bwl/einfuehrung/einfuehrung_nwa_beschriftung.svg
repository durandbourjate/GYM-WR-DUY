<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="800" height="400" fill="#ffffff"/>

  <!-- Table outer border -->
  <rect x="40" y="40" width="720" height="320" fill="none" stroke="#999999" stroke-width="1.5" rx="4"/>

  <!-- Header row background -->
  <rect x="40" y="40" width="720" height="70" fill="#f0f0f0" rx="4"/>
  <rect x="40" y="106" width="720" height="4" fill="none"/>

  <!-- Column dividers (5 columns) -->
  <line x1="184" y1="40" x2="184" y2="360" stroke="#d0d0d0" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="328" y1="40" x2="328" y2="360" stroke="#d0d0d0" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="472" y1="40" x2="472" y2="360" stroke="#d0d0d0" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="616" y1="40" x2="616" y2="360" stroke="#d0d0d0" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Header separator (solid) -->
  <line x1="40" y1="110" x2="760" y2="110" stroke="#999999" stroke-width="1.5"/>

  <!-- Row dividers -->
  <line x1="40" y1="193" x2="760" y2="193" stroke="#d0d0d0" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="40" y1="276" x2="760" y2="276" stroke="#d0d0d0" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Row numbers in first column -->
  <text x="112" y="158" text-anchor="middle" fill="#666666" font-size="20" font-weight="600">1</text>
  <text x="112" y="241" text-anchor="middle" fill="#666666" font-size="20" font-weight="600">2</text>
  <text x="112" y="325" text-anchor="middle" fill="#666666" font-size="20" font-weight="600">3</text>

  <!-- Empty cell markers (dashed rectangles) -->
  <rect x="194" y="118" width="124" height="67" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3" rx="3"/>
  <rect x="338" y="118" width="124" height="67" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3" rx="3"/>
  <rect x="482" y="118" width="124" height="67" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3" rx="3"/>
  <rect x="626" y="118" width="124" height="67" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3" rx="3"/>

  <rect x="194" y="201" width="124" height="67" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3" rx="3"/>
  <rect x="338" y="201" width="124" height="67" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3" rx="3"/>
  <rect x="482" y="201" width="124" height="67" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3" rx="3"/>
  <rect x="626" y="201" width="124" height="67" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3" rx="3"/>

  <rect x="194" y="284" width="124" height="67" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3" rx="3"/>
  <rect x="338" y="284" width="124" height="67" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3" rx="3"/>
  <rect x="482" y="284" width="124" height="67" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3" rx="3"/>
  <rect x="626" y="284" width="124" height="67" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3" rx="3"/>
</svg>