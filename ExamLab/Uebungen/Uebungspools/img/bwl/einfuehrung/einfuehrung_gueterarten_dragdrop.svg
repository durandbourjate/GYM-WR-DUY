<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="800" height="400" fill="#ffffff"/>

  <!-- Zone A -->
  <rect x="40" y="60" width="226" height="300" fill="#fafafa" stroke="#999999" stroke-width="1.5" stroke-dasharray="8,5" rx="8"/>
  <text x="153" y="40" text-anchor="middle" fill="#666666" font-size="20" font-weight="600">A</text>

  <!-- Zone B -->
  <rect x="286" y="60" width="228" height="300" fill="#fafafa" stroke="#999999" stroke-width="1.5" stroke-dasharray="8,5" rx="8"/>
  <text x="400" y="40" text-anchor="middle" fill="#666666" font-size="20" font-weight="600">B</text>

  <!-- Zone C -->
  <rect x="534" y="60" width="226" height="300" fill="#fafafa" stroke="#999999" stroke-width="1.5" stroke-dasharray="8,5" rx="8"/>
  <text x="647" y="40" text-anchor="middle" fill="#666666" font-size="20" font-weight="600">C</text>

  <!-- Drop zone indicators (subtle dashed inner rectangles) -->
  <rect x="60" y="90" width="186" height="250" fill="none" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3" rx="4"/>
  <rect x="306" y="90" width="188" height="250" fill="none" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3" rx="4"/>
  <rect x="554" y="90" width="186" height="250" fill="none" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3" rx="4"/>
</svg>