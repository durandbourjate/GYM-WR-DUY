<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Eigentumserwerbsarten — Originär oder Derivativ?</text>

  <!-- Column 1: Originärer Erwerb -->
  <rect x="30" y="55" width="355" height="330" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="207" y="80" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#15803d">Originärer Erwerb</text>
  <text x="207" y="98" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#64748b">Ersterwerb — kein Vorgänger</text>
  <line x1="50" y1="106" x2="365" y2="106" stroke="#86efac" stroke-width="1"/>
  <rect x="50" y="116" width="315" height="38" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="50" y="162" width="315" height="38" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="50" y="208" width="315" height="38" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="50" y="254" width="315" height="38" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Column 2: Derivativer Erwerb -->
  <rect x="415" y="55" width="355" height="330" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="592" y="80" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#15803d">Derivativer Erwerb</text>
  <text x="592" y="98" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#64748b">Erwerb vom Vorgänger</text>
  <line x1="435" y1="106" x2="750" y2="106" stroke="#86efac" stroke-width="1"/>
  <rect x="435" y="116" width="315" height="38" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="435" y="162" width="315" height="38" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="435" y="208" width="315" height="38" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="435" y="254" width="315" height="38" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Hint -->
  <text x="400" y="392" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#94a3b8">Ziehe die Erwerbsarten in die richtige Spalte</text>
</svg>
