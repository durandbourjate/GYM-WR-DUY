<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Nutzwertanalyse — Beschrifte die markierten Elemente</text>

  <!-- Table background -->
  <rect x="30" y="50" width="740" height="350" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

