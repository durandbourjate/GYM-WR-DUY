  <line x1="290" y1="50" x2="290" y2="400" stroke="#bfdbfe" stroke-width="1.5"/>
  <line x1="460" y1="50" x2="460" y2="400" stroke="#bfdbfe" stroke-width="1.5"/>
  <line x1="610" y1="50" x2="610" y2="400" stroke="#bfdbfe" stroke-width="1.5"/>
  <line x1="340" y1="94" x2="340" y2="400" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="480" y1="94" x2="480" y2="400" stroke="#e2e8f0" stroke-width="1"/>

