  <rect x="30" y="375" width="740" height="5" rx="0" fill="#dbeafe"/>
  <text x="115" y="362" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#1e40af">Total</text>
  <text x="245" y="362" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#1e40af">100%</text>
  <text x="400" y="362" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#1e40af">3.55</text>
  <text x="545" y="362" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#1e40af">3.45</text>
  <text x="700" y="362" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#1e40af">...</text>
