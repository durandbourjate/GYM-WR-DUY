  <text x="700" y="78" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" font-weight="700" fill="#1e40af">Alternative C</text>
  <text x="390" y="85" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="10" fill="#1e40af">Punkte | Gewichtet</text>
  <text x="530" y="85" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="10" fill="#1e40af">Punkte | Gewichtet</text>

