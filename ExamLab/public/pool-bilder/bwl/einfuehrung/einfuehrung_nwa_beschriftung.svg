  <text x="245" y="167" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">30%</text>
  <text x="315" y="167" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">5</text>
  <text x="400" y="167" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">1.5</text>
  <text x="473" y="167" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">2</text>
  <text x="545" y="167" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">0.6</text>
  <text x="700" y="167" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">...</text>
