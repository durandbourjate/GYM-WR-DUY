  <text x="315" y="122" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">4</text>
  <text x="400" y="122" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">0.8</text>
  <text x="473" y="122" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">3</text>
