  <text x="115" y="212" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">Kriterium 3</text>
  <text x="245" y="212" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">25%</text>
  <text x="315" y="212" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">3</text>
  <text x="400" y="212" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">0.75</text>
  <text x="473" y="212" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">5</text>
  <text x="545" y="212" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">1.25</text>
  <text x="700" y="212" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">...</text>
  <line x1="30" y1="230" x2="770" y2="230" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Row 4 -->
  <rect x="30" y="230" width="740" height="45" fill="#ffffff"/>
  <text x="115" y="257" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">Kriterium 4</text>
  <text x="245" y="257" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">25%</text>
  <text x="315" y="257" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">2</text>
  <text x="400" y="257" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">0.5</text>
  <text x="473" y="257" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">4</text>
  <text x="545" y="257" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">1.0</text>
  <text x="700" y="257" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#94a3b8">...</text>
