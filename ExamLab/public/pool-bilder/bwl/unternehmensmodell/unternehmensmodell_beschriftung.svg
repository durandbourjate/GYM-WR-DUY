<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">St. Galler Unternehmensmodell — Beschrifte die Elemente</text>

  <!-- Ring 3: Umweltsphären (äusserster) -->
  <circle cx="400" cy="240" r="185" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>

  <!-- Ring 2: Anspruchsgruppen -->
  <circle cx="400" cy="240" r="140" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>

  <!-- Unternehmen: Kern (geteilt in Ordnungsmomente links + Prozesse rechts) -->
  <circle cx="400" cy="240" r="95" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Ordnungsmomente-Bereich (obere Hälfte des Kerns) -->
  <path d="M310,240 A95,95 0 0,1 490,240 Z" fill="#fefce8" stroke="none"/>
  <!-- Prozesse-Bereich (untere Hälfte des Kerns) -->
  <path d="M310,240 A95,95 0 0,0 490,240 Z" fill="#fff7ed" stroke="none"/>
  <circle cx="400" cy="240" r="95" fill="none" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Zentrum: Unternehmen -->
  <circle cx="400" cy="240" r="38" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
  <text x="400" y="236" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" font-weight="700" fill="#ffffff">Unter-</text>
  <text x="400" y="250" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" font-weight="700" fill="#ffffff">nehmen</text>

  <!-- Labels placeholder (leer für Beschriftungsaufgabe) -->
  <!-- Anspruchsgruppen-Beispiele als kleine graue Punkte -->
  <circle cx="400" cy="112" r="5" fill="#94a3b8"/>
  <text x="400" y="108" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="9" fill="#94a3b8">Kunden</text>
  <circle cx="508" cy="152" r="5" fill="#94a3b8"/>
  <text x="524" y="152" font-family="'DM Sans',system-ui,sans-serif" font-size="9" fill="#94a3b8">Lieferanten</text>
  <circle cx="292" cy="152" r="5" fill="#94a3b8"/>
  <text x="230" y="152" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="9" fill="#94a3b8">Mitarbeitende</text>
  <circle cx="535" cy="240" r="5" fill="#94a3b8"/>
  <text x="552" y="244" font-family="'DM Sans',system-ui,sans-serif" font-size="9" fill="#94a3b8">Staat</text>
  <circle cx="400" cy="368" r="5" fill="#94a3b8"/>
  <text x="400" y="382" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="9" fill="#94a3b8">Eigentümer</text>

  <!-- Marker 1: Unternehmen (Kern) -->

  <!-- Marker 2: Anspruchsgruppen (Ring 2, oben) -->

  <!-- Marker 3: Umweltsphären (Ring 3, rechts) -->

  <!-- Marker 4: Interaktionsthemen (zwischen Ring 2 und 3, unten) -->

  <!-- Marker 5: Ordnungsmomente (obere Hälfte Kern, links) -->

  <!-- Marker 6: Prozesse (untere Hälfte Kern, links) -->
</svg>
