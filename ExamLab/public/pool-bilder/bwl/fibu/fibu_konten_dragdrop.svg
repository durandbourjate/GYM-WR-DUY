<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Bilanz — Ordne die Konten der richtigen Seite zu</text>

  <!-- Spalte UV: Umlaufvermögen (grün) -->
  <rect x="20" y="55" width="176" height="328" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="108" y="78" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#15803d">Umlaufverm.</text>
  <line x1="38" y1="88" x2="178" y2="88" stroke="#86efac" stroke-width="1"/>
  <text x="108" y="106" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="10" fill="#16a34a">kurzfristige Aktiven</text>
  <rect x="33" y="116" width="150" height="34" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="33" y="158" width="150" height="34" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="33" y="200" width="150" height="34" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Spalte AV: Anlagevermögen (blau) -->
  <rect x="208" y="55" width="176" height="328" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="296" y="78" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#1d4ed8">Anlageverm.</text>
  <line x1="226" y1="88" x2="366" y2="88" stroke="#93c5fd" stroke-width="1"/>
  <text x="296" y="106" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="10" fill="#1d4ed8">langfristige Aktiven</text>
  <rect x="221" y="116" width="150" height="34" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="221" y="158" width="150" height="34" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="221" y="200" width="150" height="34" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Spalte FK: Fremdkapital (orange) -->
  <rect x="396" y="55" width="176" height="328" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="484" y="78" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#c2410c">Fremdkapital</text>
  <line x1="414" y1="88" x2="554" y2="88" stroke="#fdba74" stroke-width="1"/>
  <text x="484" y="106" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="10" fill="#c2410c">Schulden</text>
  <rect x="409" y="116" width="150" height="34" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="409" y="158" width="150" height="34" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="409" y="200" width="150" height="34" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Spalte EK: Eigenkapital (rot) -->
  <rect x="584" y="55" width="196" height="328" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="682" y="78" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#dc2626">Eigenkapital</text>
  <line x1="602" y1="88" x2="762" y2="88" stroke="#fca5a5" stroke-width="1"/>
  <text x="682" y="106" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="10" fill="#dc2626">Eigenmittel</text>
  <rect x="597" y="116" width="170" height="34" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="597" y="158" width="170" height="34" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Hint -->
  <text x="400" y="392" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#94a3b8">Ziehe die Konten in die richtige Bilanzposition</text>
</svg>
