<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Beveridge-Kurve — Klicke auf die richtige Phase</text>

  <!-- Axes -->
  <line x1="80" y1="360" x2="740" y2="360" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="80" y1="60" x2="80" y2="360" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="740,355 740,365 755,360" fill="#94a3b8"/>
  <polygon points="75,60 85,60 80,45" fill="#94a3b8"/>

  <!-- Axis labels -->
  <text x="400" y="395" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" fill="#64748b">Arbeitslosenquote (u)</text>
  <text x="28" y="210" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" fill="#64748b" transform="rotate(-90,28,210)">Vakanzquote (v)</text>

  <!-- 45-Grad-Linie (u = v), gestrichelt grau -->
  <line x1="80" y1="360" x2="660" y2="80" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="8,5"/>
  <text x="670" y="78" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#94a3b8">u = v</text>

  <!-- Beveridge-Kurve: fallend und konvex (von links oben nach rechts unten) -->
  <!-- Startet bei ca. (120, 90) bis (700, 320) -->
  <path d="M120,90 C140,100 180,130 250,185 C320,240 390,285 480,315 C540,332 620,342 700,348"
        stroke="#2563eb" stroke-width="3" fill="none"/>
  <text x="110" y="82" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#2563eb" font-weight="600">Beveridge-Kurve</text>

  <!-- Punkt A: Boom (links oben auf der Kurve, u niedrig, v hoch) → x≈25%, y≈30% = pixel x200,y126 -->
  <circle cx="200" cy="126" r="16" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
  <text x="200" y="131" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#1e293b">A</text>

  <!-- Punkt B: Rezession (rechts unten auf der Kurve, u hoch, v niedrig) → x≈70%, y≈75% = pixel x554,y315 -->
  <circle cx="554" cy="315" r="16" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
  <text x="554" y="320" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#1e293b">B</text>

  <!-- Punkt C: Schnittpunkt Kurve/45°-Linie (strukturelle AL) → ca. x≈45%, y≈50% = pixel x369,y221 -->
  <circle cx="369" cy="221" r="16" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
  <text x="369" y="226" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#1e293b">C</text>

  <!-- Punkt D: Ausserhalb der Kurve (rechts oben) → x≈70%, y≈25% = pixel x554,y128 -->
  <circle cx="554" cy="128" r="16" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
  <text x="554" y="133" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#1e293b">D</text>

  <!-- Legende -->
  <line x1="100" y1="390" x2="130" y2="390" stroke="#2563eb" stroke-width="3"/>
  <text x="137" y="394" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#1e293b">Beveridge-Kurve</text>
  <line x1="280" y1="390" x2="310" y2="390" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="8,5"/>
  <text x="317" y="394" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#1e293b">45°-Linie (u = v)</text>
</svg>
