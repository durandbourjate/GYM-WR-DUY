<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#ffffff" rx="8"/>
  <text x="400" y="32" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Steuersystem Schweiz — Beschrifte die Ebenen</text>

  <!-- Obere Box: Gesamtsystem -->
  <rect x="250" y="50" width="300" height="40" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="400" y="75" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="600" fill="#1e293b">Steuern in der Schweiz</text>

  <!-- Verbindungslinien -->
  <line x1="400" y1="90" x2="400" y2="110" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="150" y1="110" x2="650" y2="110" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="150" y1="110" x2="150" y2="130" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="400" y1="110" x2="400" y2="130" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="650" y1="110" x2="650" y2="130" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Ebene Bund -->
  <rect x="50" y="130" width="200" height="40" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <!-- Steuerarten Bund (leer) -->
  <rect x="50" y="185" width="200" height="40" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="150" y1="170" x2="150" y2="185" stroke="#fca5a5" stroke-width="1"/>

  <!-- Ebene Kanton -->
  <rect x="300" y="130" width="200" height="40" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <!-- Steuerarten Kanton (leer) -->
  <rect x="300" y="185" width="200" height="40" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="400" y1="170" x2="400" y2="185" stroke="#93c5fd" stroke-width="1"/>

  <!-- Ebene Gemeinde -->
  <rect x="550" y="130" width="200" height="40" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <!-- Steuerarten Gemeinde (leer) -->
  <rect x="550" y="185" width="200" height="40" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="650" y1="170" x2="650" y2="185" stroke="#86efac" stroke-width="1"/>

  <!-- Nummerierte rote Kreise -->
  <!-- 1: Bundesebene -->

  <!-- 2: Bundessteuerarten -->

  <!-- 3: Kantonsebene -->

  <!-- 4: Kantonssteuerarten -->

  <!-- 5: Gemeindeebene -->

  <!-- 6: Gemeindesteuerarten -->
</svg>