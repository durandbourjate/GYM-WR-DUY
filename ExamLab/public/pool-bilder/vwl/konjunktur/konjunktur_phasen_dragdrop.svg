<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Konjunkturphasen — Ordne die Merkmale zu</text>

  <!-- 4 Phasen-Boxen -->
  <!-- Aufschwung -->
  <rect x="20" y="55" width="180" height="330" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="110" y="80" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#16a34a">Aufschwung</text>
  <line x1="40" y1="90" x2="180" y2="90" stroke="#86efac" stroke-width="1"/>
  <!-- Pfeil nach oben -->
  <text x="110" y="115" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="28" fill="#16a34a">&#8599;</text>

  <!-- Hochkonjunktur -->
  <rect x="210" y="55" width="180" height="330" rx="8" fill="#fefce8" stroke="#fde047" stroke-width="2"/>
  <text x="300" y="80" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#ca8a04">Hochkonjunktur</text>
  <line x1="230" y1="90" x2="370" y2="90" stroke="#fde047" stroke-width="1"/>
  <!-- Pfeil oben -->
  <text x="300" y="115" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="28" fill="#ca8a04">&#8613;</text>

  <!-- Abschwung -->
  <rect x="400" y="55" width="180" height="330" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="490" y="80" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#ea580c">Abschwung</text>
  <line x1="420" y1="90" x2="560" y2="90" stroke="#fdba74" stroke-width="1"/>
  <!-- Pfeil nach unten -->
  <text x="490" y="115" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="28" fill="#ea580c">&#8600;</text>

  <!-- Rezession -->
  <rect x="590" y="55" width="190" height="330" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="685" y="80" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#dc2626">Rezession</text>
  <line x1="610" y1="90" x2="760" y2="90" stroke="#fca5a5" stroke-width="1"/>
  <!-- Pfeil unten -->
  <text x="685" y="115" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="28" fill="#dc2626">&#8615;</text>

  <!-- Drop-Zone Markierungen (gestrichelte Rechtecke in jeder Phase) -->
  <!-- Aufschwung: 3 Slots -->
  <rect x="35" y="135" width="150" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="35" y="180" width="150" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="35" y="225" width="150" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Hochkonjunktur: 3 Slots -->
  <rect x="225" y="135" width="150" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="225" y="180" width="150" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="225" y="225" width="150" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Abschwung: 3 Slots -->
  <rect x="415" y="135" width="150" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="415" y="180" width="150" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="415" y="225" width="150" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Rezession: 3 Slots -->
  <rect x="605" y="135" width="160" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="605" y="180" width="160" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="605" y="225" width="160" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Hinweis -->
  <text x="400" y="390" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#94a3b8">Ziehe die Merkmale in die passende Phase</text>
</svg>
