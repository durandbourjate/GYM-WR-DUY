<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff" rx="8"/>
  <text x="400" y="32" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Drei-Säulen-System — Ordne die Versicherungen zu</text>

  <!-- 1. Säule -->
  <rect x="20" y="55" width="240" height="330" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="140" y="80" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#2563eb">1. Säule (Staat)</text>
  <line x1="40" y1="90" x2="240" y2="90" stroke="#93c5fd" stroke-width="1"/>
  <text x="140" y="115" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="24" fill="#2563eb">&#127963;</text>
  <rect x="35" y="135" width="210" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="35" y="180" width="210" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="35" y="225" width="210" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 2. Säule -->
  <rect x="280" y="55" width="240" height="330" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="400" y="80" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#16a34a">2. Säule (Beruf)</text>
  <line x1="300" y1="90" x2="500" y2="90" stroke="#86efac" stroke-width="1"/>
  <text x="400" y="115" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="24" fill="#16a34a">&#127970;</text>
  <rect x="295" y="135" width="210" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="295" y="180" width="210" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="295" y="225" width="210" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 3. Säule -->
  <rect x="540" y="55" width="240" height="330" rx="8" fill="#fefce8" stroke="#fde047" stroke-width="2"/>
  <text x="660" y="80" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#ca8a04">3. Säule (Privat)</text>
  <line x1="560" y1="90" x2="760" y2="90" stroke="#fde047" stroke-width="1"/>
  <text x="660" y="115" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="24" fill="#ca8a04">&#128100;</text>
  <rect x="555" y="135" width="210" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="555" y="180" width="210" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="555" y="225" width="210" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="400" y="390" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#94a3b8">Ziehe die Versicherungen und Merkmale in die passende Säule</text>
</svg>