<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Bedürfnispyramide nach Maslow — Klicke auf die richtige Stufe</text>

  <!-- Stufe A: Grundbedürfnisse (unten, breiteste, grün) -->
  <polygon points="130,390 670,390 620,330 180,330" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>

  <!-- Stufe B: Sicherheitsbedürfnisse (blau) -->
  <polygon points="180,330 620,330 575,270 225,270" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>

  <!-- Stufe C: Soziale Bedürfnisse (gelb) -->
  <polygon points="225,270 575,270 530,210 270,210" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>

  <!-- Stufe D: Wertschätzung (orange) -->
  <polygon points="270,210 530,210 487,150 313,150" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>

  <!-- Stufe E: Selbstverwirklichung (violett, Spitze) -->
  <polygon points="313,150 487,150 400,70" fill="#e9d5ff" stroke="#7c3aed" stroke-width="2"/>

  <!-- Buchstaben-Marker: A -->
  <circle cx="400" cy="360" r="18" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
  <text x="400" y="365" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#1e293b">A</text>

  <!-- Buchstaben-Marker: B -->
  <circle cx="400" cy="300" r="18" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
  <text x="400" y="305" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#1e293b">B</text>

  <!-- Buchstaben-Marker: C -->
  <circle cx="400" cy="240" r="18" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
  <text x="400" y="245" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#1e293b">C</text>

  <!-- Buchstaben-Marker: D -->
  <circle cx="400" cy="180" r="18" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
  <text x="400" y="185" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#1e293b">D</text>

  <!-- Buchstaben-Marker: E -->
  <circle cx="400" cy="110" r="18" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
  <text x="400" y="115" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#1e293b">E</text>

  <!-- Legende -->
  <text x="400" y="412" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#94a3b8">A = unten (Grundbedürfnisse) · E = oben (Selbstverwirklichung)</text>
</svg>
