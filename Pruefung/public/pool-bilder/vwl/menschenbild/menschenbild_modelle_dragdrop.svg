<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Menschenbild — Ordne die Annahmen dem passenden Modell zu</text>

  <!-- Spalte 1: Homo oeconomicus (blau) -->
  <rect x="20" y="55" width="368" height="330" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="204" y="82" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="15" font-weight="700" fill="#2563eb">Homo oeconomicus</text>
  <line x1="38" y1="92" x2="370" y2="92" stroke="#93c5fd" stroke-width="1"/>
  <!-- Icon -->
  <text x="204" y="120" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="26" fill="#2563eb">&#9884;</text>
  <!-- Drop-Slots (4 Stück) -->
  <rect x="34" y="138" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="34" y="183" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="34" y="228" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="34" y="273" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Spalte 2: Behavioral Economics (grün) -->
  <rect x="412" y="55" width="368" height="330" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="596" y="82" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="15" font-weight="700" fill="#16a34a">Behavioral Economics</text>
  <line x1="430" y1="92" x2="762" y2="92" stroke="#86efac" stroke-width="1"/>
  <!-- Icon -->
  <text x="596" y="120" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="26" fill="#16a34a">&#9774;</text>
  <!-- Drop-Slots (4 Stück) -->
  <rect x="426" y="138" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="426" y="183" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="426" y="228" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="426" y="273" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Hinweis -->
  <text x="400" y="392" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#94a3b8">Ziehe die Begriffe in die passende Kategorie</text>
</svg>
