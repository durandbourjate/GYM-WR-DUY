<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Kurvenverschiebungen — Ordne die Faktoren zu</text>

  <!-- Spalte 1: Nachfrageverschiebung (rot/rosa) -->
  <rect x="20" y="55" width="368" height="330" rx="8" fill="#fff1f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="204" y="82" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#dc2626">Nachfrageverschiebung</text>
  <line x1="38" y1="92" x2="370" y2="92" stroke="#fca5a5" stroke-width="1"/>

  <!-- Mini-Diagramm Nachfrage: N-Kurve verschiebt sich rechts -->
  <line x1="55" y1="130" x2="95" y2="98" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="75" y1="130" x2="115" y2="98" stroke="#ef4444" stroke-width="2"/>
  <text x="118" y="97" font-family="'DM Sans',system-ui,sans-serif" font-size="9" fill="#dc2626">N'</text>
  <text x="98" y="97" font-family="'DM Sans',system-ui,sans-serif" font-size="9" fill="#94a3b8">N</text>
  <line x1="47" y1="135" x2="125" y2="135" stroke="#94a3b8" stroke-width="1"/>
  <line x1="47" y1="98" x2="47" y2="135" stroke="#94a3b8" stroke-width="1"/>
  <text x="155" y="118" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#dc2626">→ Kurve verschiebt sich</text>

  <!-- Drop-Slots (4 Stück) -->
  <rect x="34" y="148" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="34" y="193" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="34" y="238" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="34" y="283" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Spalte 2: Angebotsverschiebung (blau) -->
  <rect x="412" y="55" width="368" height="330" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="596" y="82" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#2563eb">Angebotsverschiebung</text>
  <line x1="430" y1="92" x2="762" y2="92" stroke="#93c5fd" stroke-width="1"/>

  <!-- Mini-Diagramm Angebot: A-Kurve verschiebt sich rechts -->
  <line x1="447" y1="98" x2="487" y2="130" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="467" y1="98" x2="507" y2="130" stroke="#2563eb" stroke-width="2"/>
  <text x="510" y="130" font-family="'DM Sans',system-ui,sans-serif" font-size="9" fill="#2563eb">A'</text>
  <text x="490" y="130" font-family="'DM Sans',system-ui,sans-serif" font-size="9" fill="#94a3b8">A</text>
  <line x1="439" y1="135" x2="517" y2="135" stroke="#94a3b8" stroke-width="1"/>
  <line x1="439" y1="98" x2="439" y2="135" stroke="#94a3b8" stroke-width="1"/>
  <text x="547" y="118" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#2563eb">→ Kurve verschiebt sich</text>

  <!-- Drop-Slots (4 Stück) -->
  <rect x="426" y="148" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="426" y="193" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="426" y="238" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="426" y="283" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Hinweis -->
  <text x="400" y="392" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#94a3b8">Ziehe die Begriffe in die passende Kategorie</text>
</svg>
