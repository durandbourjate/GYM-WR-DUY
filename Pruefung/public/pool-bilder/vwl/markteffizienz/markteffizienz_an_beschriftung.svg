<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Marktdiagramm — Beschrifte die markierten Elemente</text>

  <!-- Achsen -->
  <line x1="110" y1="380" x2="720" y2="380" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="110" y1="50" x2="110" y2="380" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="715,375 715,385 730,380" fill="#94a3b8"/>
  <polygon points="105,55 115,55 110,42" fill="#94a3b8"/>

  <!-- Gleichgewichtslinien (gestrichelt) -->
  <line x1="110" y1="215" x2="415" y2="215" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="415" y1="215" x2="415" y2="380" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- Konsumentenrente: Dreieck über GG-Preis, unter Nachfragekurve -->
  <!-- Nachfragekurve geht von (130,80) nach (700,360): bei x=415 ist y = 80 + (360-80)*(415-130)/(700-130) = 80+280*285/570 = 80+140 = 220 ✓ -->
  <!-- Dreieck: (130,80), (415,215), (130,215) -->
  <polygon points="130,80 415,215 130,215" fill="#fde68a" fill-opacity="0.45" stroke="none"/>

  <!-- Angebotskurve (blau, steigend): (130,360) → (700,80) -->
  <line x1="130" y1="360" x2="700" y2="80" stroke="#2563eb" stroke-width="2.5"/>

  <!-- Nachfragekurve (rot, fallend): (130,80) → (700,360) -->
  <line x1="130" y1="80" x2="700" y2="360" stroke="#ef4444" stroke-width="2.5"/>

  <!-- Gleichgewichtspunkt -->
  <circle cx="415" cy="220" r="5" fill="#1e293b"/>

  <!-- Nummerierte rote Kreise -->

  <!-- Kreis 1: Angebotskurve (oben rechts, auf der Kurve bei x=620, y=150) -->

  <!-- Kreis 2: Nachfragekurve (unten rechts, auf der Kurve bei x=620, y=285) -->

  <!-- Kreis 3: Gleichgewichtspunkt -->

  <!-- Kreis 4: Preis-Achse (y-Achse oben) -->

  <!-- Kreis 5: Mengen-Achse (x-Achse rechts) -->

  <!-- Kreis 6: Konsumentenrente (Dreieck, Mitte bei ca. x=285, y=170) -->

  <!-- Hinweis -->
  <text x="400" y="442" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#94a3b8">Gib die Bezeichnung jedes markierten Elements ein</text>
</svg>
