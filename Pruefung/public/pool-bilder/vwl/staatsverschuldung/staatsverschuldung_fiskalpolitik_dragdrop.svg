<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff" rx="8"/>
  <text x="400" y="32" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Fiskalpolitik — Ordne die Massnahmen zu</text>

  <!-- Expansiv -->
  <rect x="20" y="55" width="370" height="330" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="205" y="80" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#16a34a">Expansive Fiskalpolitik</text>
  <line x1="40" y1="90" x2="370" y2="90" stroke="#86efac" stroke-width="1"/>
  <text x="205" y="115" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#16a34a">Rezession bekämpfen &#8599;</text>
  <rect x="35" y="135" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="35" y="180" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="35" y="225" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="35" y="270" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Restriktiv -->
  <rect x="410" y="55" width="370" height="330" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="595" y="80" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#dc2626">Restriktive Fiskalpolitik</text>
  <line x1="430" y1="90" x2="760" y2="90" stroke="#fca5a5" stroke-width="1"/>
  <text x="595" y="115" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#dc2626">Überhitzung bremsen &#8600;</text>
  <rect x="425" y="135" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="425" y="180" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="425" y="225" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="425" y="270" width="340" height="35" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="400" y="390" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#94a3b8">Ziehe die fiskalpolitischen Massnahmen in die passende Kategorie</text>
</svg>