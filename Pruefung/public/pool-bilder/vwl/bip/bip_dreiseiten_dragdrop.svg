<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">BIP-Berechnungsmethoden — Ordne die Begriffe zu</text>

  <!-- Spalte 1: Entstehungsseite (grün) -->
  <rect x="20" y="56" width="240" height="328" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="140" y="80" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#16a34a">Entstehungsseite</text>
  <line x1="40" y1="90" x2="240" y2="90" stroke="#86efac" stroke-width="1"/>
  <text x="140" y="110" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#16a34a">Bruttowertschöpfung</text>
  <!-- 3 Drop-Slots -->
  <rect x="35" y="118" width="210" height="40" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="35" y="168" width="210" height="40" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="35" y="218" width="210" height="40" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Spalte 2: Verwendungsseite (blau) -->
  <rect x="272" y="56" width="240" height="328" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="392" y="80" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#2563eb">Verwendungsseite</text>
  <line x1="292" y1="90" x2="492" y2="90" stroke="#93c5fd" stroke-width="1"/>
  <text x="392" y="110" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#2563eb">Y = C + I + G + NX</text>
  <!-- 3 Drop-Slots -->
  <rect x="287" y="118" width="210" height="40" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="287" y="168" width="210" height="40" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="287" y="218" width="210" height="40" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Spalte 3: Verteilungsseite (orange) -->
  <rect x="524" y="56" width="256" height="328" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="652" y="80" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#ea580c">Verteilungsseite</text>
  <line x1="544" y1="90" x2="760" y2="90" stroke="#fdba74" stroke-width="1"/>
  <text x="652" y="110" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#ea580c">Faktoreinkommen</text>
  <!-- 3 Drop-Slots -->
  <rect x="539" y="118" width="226" height="40" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="539" y="168" width="226" height="40" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="539" y="218" width="226" height="40" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Hinweis -->
  <text x="400" y="393" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#94a3b8">Ziehe die Begriffe in die passende Berechnungsseite</text>
</svg>
