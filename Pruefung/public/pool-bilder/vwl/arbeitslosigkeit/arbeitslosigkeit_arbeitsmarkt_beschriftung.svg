<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Arbeitsmarktdiagramm — Beschrifte die markierten Stellen</text>

  <!-- Axes -->
  <line x1="100" y1="390" x2="700" y2="390" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="100" y1="65" x2="100" y2="390" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="700,385 700,395 715,390" fill="#94a3b8"/>
  <polygon points="95,65 105,65 100,50" fill="#94a3b8"/>

  <!-- Axis labels -->
  <text x="400" y="430" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" fill="#64748b">Arbeitsmenge (L)</text>
  <text x="32" y="228" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" fill="#64748b" transform="rotate(-90,32,228)">Reallohn (w/P)</text>

  <!-- Arbeitsnachfrage Ld: fallende Kurve von (120,100) bis (650,340) -->
  <path d="M120,100 C180,140 300,210 450,290 C530,328 600,348 650,358"
        stroke="#2563eb" stroke-width="2.5" fill="none"/>

  <!-- Arbeitsangebot Ls: steigende Kurve von (120,370) bis (650,120) -->
  <path d="M120,370 C180,345 280,295 380,240 C460,200 560,165 650,140"
        stroke="#16a34a" stroke-width="2.5" fill="none"/>

  <!-- Gleichgewicht: Schnittpunkt ca. bei (380,240) -->
  <!-- Gleichgewichtslohn: horizontale gestrichelte Linie bei y=240 -->
  <line x1="100" y1="240" x2="380" y2="240" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Gleichgewichtsmenge: vertikale gestrichelte Linie bei x=380 -->
  <line x1="380" y1="240" x2="380" y2="390" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Mindestlohn: horizontale Linie bei y=185 (über Gleichgewicht) -->
  <line x1="100" y1="185" x2="620" y2="185" stroke="#ef4444" stroke-width="2"/>

  <!-- Schnittpunkte Mindestlohn mit Ls und Ld: -->
  <!-- Ls schneidet y=185 ca. bei x=570 -->
  <!-- Ld schneidet y=185 ca. bei x=240 -->
  <!-- Arbeitslosigkeit: horizontale Klammer bei y=185 zwischen x=240 und x=570 -->
  <line x1="240" y1="185" x2="570" y2="185" stroke="#ef4444" stroke-width="0"/>
  <!-- Schraffierung Arbeitslosigkeit -->
  <rect x="240" y="175" width="330" height="20" fill="#fef2f2" opacity="0.7"/>
  <line x1="240" y1="168" x2="240" y2="202" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="570" y1="168" x2="570" y2="202" stroke="#ef4444" stroke-width="1.5"/>

  <!-- Marker 1: Arbeitsangebot Ls (oben rechts) -->

  <!-- Marker 2: Arbeitsnachfrage Ld (rechts unten) -->

  <!-- Marker 3: Gleichgewichtslohn (Achse links) -->

  <!-- Marker 4: Mindestlohn (Achse links) -->

  <!-- Marker 5: Arbeitslosigkeit (unten Mitte) -->

  <!-- Marker 6: Gleichgewichtsmenge (x-Achse) -->
</svg>
