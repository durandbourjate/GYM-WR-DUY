<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Mietrecht — Pflichten Vermieter oder Mieter?</text>

  <!-- Column 1: Pflichten Vermieter -->
  <rect x="30" y="55" width="355" height="330" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="207" y="82" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#15803d">Pflichten Vermieter</text>
  <text x="207" y="100" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#64748b">OR 256–259h</text>
  <line x1="50" y1="108" x2="365" y2="108" stroke="#86efac" stroke-width="1"/>
  <rect x="50" y="118" width="315" height="38" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="50" y="164" width="315" height="38" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="50" y="210" width="315" height="38" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Column 2: Pflichten Mieter -->
  <rect x="415" y="55" width="355" height="330" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="592" y="82" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="700" fill="#15803d">Pflichten Mieter</text>
  <text x="592" y="100" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#64748b">OR 257–257f, 262, 267</text>
  <line x1="435" y1="108" x2="750" y2="108" stroke="#86efac" stroke-width="1"/>
  <rect x="435" y="118" width="315" height="38" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="435" y="164" width="315" height="38" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="435" y="210" width="315" height="38" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="435" y="256" width="315" height="38" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="435" y="302" width="315" height="38" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Hint -->
  <text x="400" y="392" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="11" fill="#94a3b8">Ziehe die Pflichten zur richtigen Vertragspartei</text>
</svg>
